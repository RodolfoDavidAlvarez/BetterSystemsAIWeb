<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Developer Tracker · Better Systems AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  /* Single tracker — every signed-in user (admin or developer) sees and uses everything.
     The .owner-only class is kept for legacy markup but no longer hides anything. */

  /* Source context — clickable + expandable panel */
  .meta-item.source-link { transition: background .15s, color .15s, border-color .15s; }
  .meta-item.source-link.has-context { cursor: pointer; border-color: var(--line-strong); font-weight: 600; }
  .meta-item.source-link.has-context:hover { background: var(--ink); color: white; }
  .meta-item.source-link.is-open { background: var(--accent); color: white; border-color: var(--accent); }
  .meta-item.source-link.no-context { opacity: .5; cursor: help; }
  .context-panel {
    margin: 12px 0 4px;
    border-left: 3px solid var(--accent);
    background: var(--paper);
    border-radius: 0 10px 10px 0;
    padding: 14px 18px;
    animation: cxSlide .18s ease-out;
  }
  @keyframes cxSlide { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .context-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 10px;
  }
  .context-head-label {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .context-head-ref {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    color: var(--ink-3);
    max-width: 55%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 3px 8px;
  }
  .context-body {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--ink-2);
    white-space: pre-wrap;
    word-wrap: break-word;
    margin: 0;
    max-height: 460px;
    overflow-y: auto;
  }
  :root {
    /* Harmonized with /workspace editorial palette — paper-and-ink */
    --bg: #f5f3ef;
    --paper: #ebe8e1;
    --ink: #0a0a0a;
    --ink-2: #1a1a1a;
    --ink-3: #555555;
    --ink-4: #888888;
    --line: #d4d0c8;
    --line-strong: #1a1a1a;
    --accent: #1d3eef;
    --hot: #d40000;
    --green: #15803d;
    --orange: #c2410c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Geist", -apple-system, system-ui, sans-serif;
    font-feature-settings: "ss01", "ss02";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  body { min-height: 100vh; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 14px 24px 80px; }

  /* === HEADER — tight one-line === */
  .masthead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .masthead-left { flex: 1; display: flex; align-items: baseline; gap: 14px; }
  .eyebrow {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0;
  }
  h1.masthead-title {
    font-family: "Geist", sans-serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 0;
  }
  h1.masthead-title em {
    font-style: normal;
    color: var(--accent);
  }
  .masthead-sub { display: none; }
  .masthead-sub kbd {
    font-family: "Geist Mono", monospace;
    font-size: 12px;
    font-weight: 700;
    background: var(--ink);
    color: white;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .add-btn {
    background: var(--ink);
    color: white;
    border: 0;
    padding: 14px 24px;
    font-family: "Geist", sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .add-btn:hover { background: var(--accent); }
  .add-btn:active { transform: scale(0.97); }
  .add-btn .plus { font-size: 20px; line-height: 1; font-weight: 700; }

  /* === BRIEF — single inline ribbon, no boxes === */
  .brief {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin-bottom: 16px;
    padding: 6px 0;
    border-bottom: 1px solid var(--line);
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .brief-cell {
    display: inline-flex;
    align-items: baseline;
    gap: 5px;
    padding: 4px 12px 4px 0;
    margin-right: 4px;
    cursor: pointer;
    color: var(--ink-3);
    transition: color 0.12s;
  }
  .brief-cell:not(:last-child)::after {
    content: "·";
    margin-left: 12px;
    color: var(--ink-4);
    opacity: 0.6;
  }
  .brief-cell:hover { color: var(--ink); }
  .brief-cell.is-active { color: var(--ink); font-weight: 700; }
  .brief-num {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0;
    line-height: 1;
    font-feature-settings: "tnum";
  }
  .brief-cell.zero .brief-num { color: var(--ink-4); opacity: 0.5; }
  .brief-cell.has-value.b-flight .brief-num { color: var(--orange); }
  .brief-cell.has-value.b-shipped .brief-num { color: var(--accent); }
  .brief-cell.has-value.b-delivered .brief-num { color: var(--green); }
  .brief-cell.has-value.b-pass .brief-num { color: var(--green); }
  .brief-cell.has-value.b-fail .brief-num { color: var(--hot); }
  .brief-label {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: inherit;
    margin: 0;
  }

  /* === FILTER BAR === */
  .filterbar {
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    font-family: "Geist", sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 32px 9px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { outline: 0; border-color: var(--ink); }
  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    color: var(--ink-4);
    border: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .search-wrap.has-value .search-clear { display: inline-flex; }
  .search-clear:hover { color: var(--ink); }

  .filter-select {
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    background: white;
    border: 1px solid var(--line);
    padding: 8px 28px 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23555' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    transition: border-color 0.15s;
  }
  .filter-select:hover, .filter-select:focus { border-color: var(--ink); outline: 0; }
  .filter-select.is-active { border-color: var(--ink); font-weight: 600; }

  .bulk-toggle {
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: white;
    color: var(--ink-3);
    border: 1px solid var(--line);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
    white-space: nowrap;
  }
  .bulk-toggle:hover { border-color: var(--ink); color: var(--ink); }
  .bulk-toggle.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .filter-reset {
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 500;
    background: transparent;
    color: var(--ink-4);
    border: 0;
    padding: 6px 4px;
    cursor: pointer;
    white-space: nowrap;
    visibility: hidden;
  }
  .filter-reset.visible { visibility: visible; }
  .filter-reset:hover { color: var(--hot); text-decoration: underline; }

  /* Brief cells become clickable status filters */
  .brief-cell { cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .brief-cell:hover { border-color: var(--ink-3); }
  .brief-cell.is-active {
    border-color: var(--ink);
    border-width: 2.5px;
  }
  .brief-cell.is-active.b-flight { border-color: var(--orange); }
  .brief-cell.is-active.b-shipped { border-color: var(--accent); }
  .brief-cell.is-active.b-delivered { border-color: var(--green); }
  .brief-cell.is-active.b-pass { border-color: var(--green); }
  .brief-cell.is-active.b-fail { border-color: var(--hot); }
  .brief-cell.is-active.b-skipped { border-color: var(--ink-3); }
  .brief-cell.has-value.b-delivered .brief-num { color: var(--green); }
  .brief-cell.has-value.b-skipped .brief-num { color: var(--ink-3); }

  /* === BULK ACTION BAR (sticky bottom) === */
  .bulk-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--ink);
    color: white;
    padding: 14px 20px;
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.28);
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 100;
    font-family: "Geist", sans-serif;
    transition: transform 0.18s ease-out;
    max-width: calc(100vw - 32px);
    flex-wrap: wrap;
  }
  .bulk-bar.visible { transform: translateX(-50%) translateY(0); }
  .bulk-bar .count {
    font-size: 14px;
    font-weight: 800;
    padding: 4px 10px;
    background: var(--accent);
    border-radius: 999px;
  }
  .bulk-bar select {
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 12px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    cursor: pointer;
  }
  .bulk-bar select option { color: var(--ink); background: white; }
  .bulk-bar button {
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    background: white;
    color: var(--ink);
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .bulk-bar button:hover { transform: translateY(-1px); }
  .bulk-bar button.danger { background: var(--hot); color: white; }
  .bulk-bar button.ghost { background: transparent; color: white; border: 1.5px solid rgba(255,255,255,0.3); }

  /* === BULK SELECT CHECKBOX === */
  .bulk-check {
    appearance: none;
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border: 2.5px solid var(--ink-4);
    border-radius: 5px;
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    margin-right: 4px;
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
  }
  .bulk-check:hover { border-color: var(--accent); }
  .bulk-check:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .bulk-check:checked::after {
    content: "✓";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 900; line-height: 1;
  }

  /* === REORDER ARROWS (fallback for non-drag — visible only on hover, smaller) === */
  .reorder-col {
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .item:hover .reorder-col { opacity: 0.7; }
  .item:hover .reorder-col:hover { opacity: 1; }
  .reorder-btn {
    background: transparent;
    border: 1.5px solid transparent;
    cursor: pointer;
    padding: 2px 6px;
    font-size: 12px;
    color: var(--ink-3);
    border-radius: 4px;
    line-height: 1;
    font-weight: 700;
  }
  .reorder-btn:hover {
    background: var(--paper);
    color: var(--ink);
    border-color: var(--line);
  }

  /* === DEAL SECTION === */
  .deal { margin-bottom: 40px; }
  .deal-hd {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--deal-color, var(--ink));
    color: white;
    border-radius: 14px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 0 var(--deal-shadow, rgba(0,0,0,0.6));
  }
  .deal-hd:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--deal-shadow, rgba(0,0,0,0.6)); }
  .deal-hd:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--deal-shadow, rgba(0,0,0,0.6)); }
  .deal-chev {
    font-family: "Geist Mono", monospace;
    font-size: 18px;
    color: white;
    transition: transform 0.16s ease-out;
    width: 16px;
    line-height: 1;
    font-weight: 700;
  }
  .deal.collapsed .deal-chev { transform: rotate(-90deg); }
  .deal-name {
    font-family: "Geist", sans-serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.025em;
    color: white;
    line-height: 1;
    flex: 1;
  }
  .deal-mini {
    display: flex;
    gap: 14px;
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0;
    color: rgba(255,255,255,0.95);
  }
  .deal-mini b { color: white; font-weight: 900; font-size: 16px; margin-right: 2px; }
  .deal-body { padding-top: 4px; }
  .deal.collapsed .deal-body { display: none; }

  /* === VERSION GROUP === */
  .vgroup { margin-top: 20px; }
  .vgroup:first-child { margin-top: 16px; }
  .vgroup-hd {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 4px 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 10px;
  }
  /* Single combined label: "Release [v2.5]" — the v2.5 part is editable */
  .vgroup-label {
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    flex: 1;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .vgroup-num {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 14px;
    font-weight: 800;
    color: white;
    background: var(--deal-color, var(--accent));
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: -0.01em;
    cursor: text;
    border: 1px solid transparent;
    outline: none;
    min-width: 36px;
    text-align: center;
    transition: filter 0.1s, transform 0.1s;
    text-transform: none;
  }
  .vgroup-num:hover { filter: brightness(1.08); }
  .vgroup-num:focus { background: var(--paper); color: var(--ink); border-color: var(--ink); }
  .vgroup-count {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-3);
    letter-spacing: 0.06em;
  }
  .progress-pct-version {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
  }

  /* === Drag-and-drop reorder === */
  .item { transition: border-color 0.12s, transform 0.1s, opacity 0.12s, box-shadow 0.12s; }
  .item.dragging {
    opacity: 0.4;
    transform: scale(0.98);
    cursor: grabbing;
  }
  .item.drag-over-top {
    border-top: 3px solid var(--accent) !important;
    margin-top: 4px;
  }
  .item.drag-over-bottom {
    border-bottom: 3px solid var(--accent) !important;
    margin-bottom: 13px;
  }
  .drag-handle {
    width: 14px;
    cursor: grab;
    color: var(--ink-4);
    font-size: 14px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
    user-select: none;
    text-align: center;
    flex-shrink: 0;
    align-self: center;
    padding: 0 2px;
  }
  .drag-handle:hover { color: var(--ink); }
  .drag-handle:active { cursor: grabbing; }
  .item:hover .drag-handle { opacity: 0.55; }
  .item:hover .drag-handle:hover { opacity: 1; }

  /* Per-item version chip (editable, click to change release) */
  .version-chip {
    display: inline-flex;
    align-items: center;
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-2);
    background: var(--paper);
    padding: 2px 8px;
    border: 1px solid var(--line);
    border-radius: 4px;
    cursor: text;
    outline: none;
    letter-spacing: 0.02em;
    min-width: 32px;
    text-align: center;
    transition: border-color 0.1s, background 0.1s, color 0.1s;
  }
  .version-chip:hover { border-color: var(--ink-3); color: var(--ink); }
  .version-chip:focus { border-color: var(--ink); background: white; color: var(--ink); }

  /* === ITEM (Card mode default — more open, more breathing room) === */
  .item {
    padding: 26px 24px 26px 28px;
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 14px;
    background: var(--row-tint, white);
    border-left: 4px solid var(--row-edge, var(--line));
    box-shadow: 0 1px 0 rgba(10,10,10,0.02);
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
  }
  .item:last-child { margin-bottom: 0; }
  .item:hover {
    border-color: var(--ink-3);
    border-left-color: var(--row-edge, var(--ink));
    box-shadow: 0 2px 8px rgba(10,10,10,0.05);
  }
  .item:hover .item-actions { opacity: 1; }
  .item.flash { animation: itemFlash 0.28s ease-out; }
  @keyframes itemFlash {
    0% { background: #fff7c2; }
    100% { background: var(--row-tint, white); }
  }

  /* === STATUS-BASED ROW TINTING — quick visual scan, not loud === */
  /* Each row gets a subtle background + 4px left edge in its status color */
  .item.row-s-open        { --row-tint: white;                          --row-edge: #d4d0c8; }
  .item.row-s-in_flight   { --row-tint: rgba(194, 65, 12, 0.045);       --row-edge: var(--orange); }
  .item.row-s-shipped     { --row-tint: rgba(29, 62, 239, 0.04);        --row-edge: var(--accent); }
  .item.row-s-tested_pass { --row-tint: rgba(21, 128, 61, 0.045);       --row-edge: var(--green); }
  .item.row-s-tested_fail { --row-tint: rgba(212, 0, 0, 0.05);          --row-edge: var(--hot); }
  .item.row-s-wont_do     { --row-tint: rgba(10, 10, 10, 0.03);         --row-edge: var(--ink-4); }

  /* Line-mode row tinting — subtler, just a left edge stripe */
  .item.line {
    --row-edge: transparent;
    box-shadow: inset 4px 0 0 var(--row-edge);
  }
  .item.line.row-s-in_flight   { box-shadow: inset 3px 0 0 var(--orange); }
  .item.line.row-s-shipped     { box-shadow: inset 3px 0 0 var(--accent); }
  .item.line.row-s-tested_pass { box-shadow: inset 3px 0 0 var(--green); }
  .item.line.row-s-tested_fail { box-shadow: inset 3px 0 0 var(--hot); }
  .item.line.row-s-wont_do     { box-shadow: inset 3px 0 0 var(--ink-4); opacity: 0.7; }
  .item.line.row-s-open        { box-shadow: inset 3px 0 0 var(--line); }
  .item.line:hover {
    background: var(--row-tint, rgba(29, 62, 239, 0.025));
  }

  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .item-pillstack {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    align-items: flex-start;
    width: 140px;
    padding-top: 1px;
  }
  .item-main { flex: 1; min-width: 0; padding-top: 2px; display: flex; flex-direction: column; gap: 12px; }
  .item-title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.45;
    color: var(--ink);
    letter-spacing: -0.012em;
    outline: none;
    cursor: text;
    padding: 2px 6px;
    margin-left: -6px;
    border-radius: 5px;
  }
  .item-title:focus { background: #fff7c2; box-shadow: 0 0 0 2px #fff7c2; }
  .item-title:empty:before { content: "Untitled"; color: var(--ink-4); }

  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-family: "Geist", sans-serif;
    font-size: 13px;
    color: var(--ink-2);
    margin-top: 0;
    font-weight: 500;
    align-items: center;
  }
  .item-meta .meta-item { display: inline-flex; align-items: center; gap: 5px; }
  .item-meta .commit { font-family: "Geist Mono", monospace; font-weight: 600; color: var(--ink); }
  /* Notes & attach links — modern pill chips with icon + count */
  .item-meta .notes-link,
  .item-meta .attach-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px 5px 9px;
    background: var(--paper);
    border: 1px solid transparent;
    border-radius: 999px;
    color: var(--ink-3);
    cursor: pointer;
    user-select: none;
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    transition: background 0.1s, color 0.1s, border-color 0.1s, transform 0.08s;
    white-space: nowrap;
  }
  .item-meta .notes-link:hover,
  .item-meta .attach-link:hover {
    background: white;
    border-color: var(--ink-3);
    color: var(--ink);
  }
  .item-meta .notes-link:active,
  .item-meta .attach-link:active { transform: scale(0.97); }
  .item-meta .notes-link.has-unresolved {
    background: rgba(212, 0, 0, 0.08);
    color: var(--hot);
    border-color: rgba(212, 0, 0, 0.25);
  }
  .item-meta .notes-link.has-unresolved:hover { background: rgba(212, 0, 0, 0.12); border-color: var(--hot); }
  .item-meta .attach-link.has-files {
    background: rgba(29, 62, 239, 0.08);
    color: var(--accent);
    border-color: rgba(29, 62, 239, 0.25);
  }
  .item-meta .attach-link.has-files:hover { background: rgba(29, 62, 239, 0.12); border-color: var(--accent); }
  .item-meta .attach-link svg,
  .item-meta .notes-link svg {
    flex-shrink: 0;
    transition: transform 0.1s;
  }
  .item-meta .attach-link:hover svg,
  .item-meta .notes-link:hover svg { transform: scale(1.06); }
  .item-meta .ico-count {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    min-width: 8px;
    text-align: center;
  }

  /* Attachments — integrated thumbnail strip with eyebrow label */
  .attachments-section {
    margin-top: 14px;
    padding: 12px 14px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    position: relative;
  }
  .attachments-section::before {
    content: "Files";
    position: absolute;
    top: -7px;
    left: 12px;
    background: white;
    padding: 0 6px;
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
  }
  /* When the attachments strip lives inside a drawer, it sits on white not paper —
     so flip the eyebrow background and the section bg accordingly */
  .row-drawer .attachments-section { background: white; padding: 14px; }
  .row-drawer .attachments-section::before { background: var(--paper); }
  .att-thumb {
    position: relative;
    width: 64px;
    height: 64px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: white;
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 0 rgba(10,10,10,0.04);
    transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s;
  }
  .att-thumb:hover {
    border-color: var(--ink);
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(10,10,10,0.12);
  }
  .att-thumb img, .att-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .att-thumb.is-file { background: white; flex-direction: column; padding: 6px 4px; gap: 4px; color: var(--ink-2); }
  .att-thumb.is-file:hover { color: var(--accent); }
  .att-thumb.is-file .att-icon { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .att-thumb.is-file .att-icon svg { display: block; }
  .att-thumb.is-file .att-name { font-family: "Geist Mono", ui-monospace, monospace; font-size: 8px; font-weight: 600; line-height: 1.15; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink-3); letter-spacing: 0.02em; }
  .att-thumb.is-video::after {
    content: "▶";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.35);
    color: white;
    font-size: 18px;
  }
  .att-del {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    color: white;
    border: 0;
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .att-thumb:hover .att-del { display: flex; }
  .att-add {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    border: 1.5px dashed var(--line);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-4);
    font-size: 22px;
    line-height: 1;
    flex-shrink: 0;
    transition: border-color 0.12s, color 0.12s;
  }
  .att-add:hover { border-color: var(--ink); color: var(--ink); }
  .att-uploading { opacity: 0.5; pointer-events: none; }

  /* Drag-over highlight on the entire item */
  .item.is-dragover {
    background: rgba(29, 62, 239, 0.05);
    box-shadow: inset 0 0 0 2px var(--accent);
    border-radius: 8px;
  }

  .item-actions {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .actions-always { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .icon-btn {
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 8px;
    border-radius: 6px;
    color: var(--ink-2);
    line-height: 0;
    font-size: 22px;
    font-weight: 700;
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
  }
  .icon-btn:hover { background: var(--paper); color: var(--ink); }
  .icon-btn.danger:hover { background: var(--hot); color: white; }
  /* Lifecycle row — four steps: delivered → shipped → invoiced → paid */
  .lifecycle {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 6px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: white;
  }
  .lc-step {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: white;
    cursor: default;
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: transform 0.12s, border-color 0.12s;
    position: relative;
  }
  .lc-step.is-clickable { cursor: pointer; }
  .lc-step.is-clickable:hover { border-color: var(--ink); transform: scale(1.08); }
  .lc-step.lc-on.lc-delivered { background: var(--green); color: white; border-color: var(--green); }
  .lc-step.lc-on.lc-shipped   { background: var(--accent); color: white; border-color: var(--accent); }
  .lc-step.lc-on.lc-invoiced  { background: var(--orange); color: white; border-color: var(--orange); }
  .lc-step.lc-on.lc-paid      { background: #b8860b; color: white; border-color: #b8860b; }
  .lc-sep { width: 6px; height: 1px; background: var(--line); }

  /* === STATUS PILL === */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 11px;
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 2px solid;
    border-radius: 8px;
    line-height: 1;
    white-space: nowrap;
    width: 100%;
    justify-content: flex-start;
    box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    box-sizing: border-box;
  }
  .pill:hover { transform: translateY(-2px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
  .pill:active { transform: translateY(2px); box-shadow: 0 0 0 rgba(0,0,0,0.15); }
  .pill.cycling { animation: pillCycle 0.18s ease-out; }
  @keyframes pillCycle {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .pill .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .s-open { background: white; border-color: var(--ink); color: var(--ink); }
  .s-in_flight { background: var(--orange); border-color: var(--orange); color: white; }
  .s-shipped { background: var(--accent); border-color: var(--accent); color: white; }
  .s-tested_pass { background: var(--green); border-color: var(--green); color: white; }
  .s-tested_fail { background: var(--hot); border-color: var(--hot); color: white; }
  .s-wont_do { background: var(--paper); border-color: var(--ink-4); color: var(--ink-4); text-decoration: line-through; }

  /* === FILTER ACTIVE BANNER — wire-service alert bar ===
     Editorial alert tape. Black bar with crimson eyebrow stamp, monospace tags.
     Sticky so the user always sees it; click anywhere clears every filter. */
  .filter-banner {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--ink);
    color: #f5f3ef;
    padding: 0;
    margin: 0 -24px 14px -24px;
    border-top: 3px solid var(--hot);
    border-bottom: 1px solid var(--ink);
    display: none;
    cursor: pointer;
    transition: background 0.18s ease;
    overflow: hidden;
    position: sticky;
  }
  .filter-banner.visible {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: stretch;
  }
  .filter-banner:hover { background: #1c0808; }
  .filter-banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(135deg, transparent 0 6px, rgba(212,0,0,0.05) 6px 7px);
    pointer-events: none;
  }
  .filter-banner-stamp {
    background: var(--hot);
    color: white;
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  .filter-banner-stamp::before {
    content: "●";
    color: white;
    animation: fbPulse 1.4s ease-in-out infinite;
  }
  @keyframes fbPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .filter-banner-text {
    padding: 12px 18px;
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(245, 243, 239, 0.85);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
    line-height: 1.4;
  }
  .filter-banner-text .fb-prefix {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-right: 4px;
  }
  .filter-banner-text .fb-key {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    font-weight: 700;
    background: rgba(245,243,239,0.08);
    border: 1px solid rgba(245,243,239,0.18);
    padding: 3px 9px;
    border-radius: 3px;
    color: #f5f3ef;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .filter-banner-cta {
    background: #f5f3ef;
    color: var(--ink);
    padding: 0 22px;
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 7px;
    position: relative;
    z-index: 1;
    border-left: 1px solid rgba(245,243,239,0.15);
    transition: background 0.15s, color 0.15s;
  }
  .filter-banner:hover .filter-banner-cta {
    background: var(--hot);
    color: white;
  }
  @media (max-width: 640px) {
    .filter-banner.visible { grid-template-columns: 1fr; }
    .filter-banner-stamp, .filter-banner-cta { padding: 8px 14px; justify-content: flex-start; border: 0; }
    .filter-banner-cta { border-top: 1px solid rgba(245,243,239,0.15); justify-content: center; padding: 10px; }
  }

  /* === VIDEO CARD — filmstrip cell, ink rule, monospace REC tag ===
     The thumbnail is the centerpiece. Click anywhere on the card → modal plays.
     Designed to feel like a single cell pulled from a contact sheet. */
  .video-card {
    margin-top: 6px;
    background: var(--ink);
    border: 1px solid var(--ink);
    box-shadow: 4px 4px 0 var(--paper), 4px 4px 0 1px var(--ink);
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .video-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--paper), 6px 6px 0 1px var(--ink);
  }
  .video-card:active {
    transform: translate(0, 0);
    box-shadow: 2px 2px 0 var(--paper), 2px 2px 0 1px var(--ink);
  }
  .video-card-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    background-color: #000;
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    position: relative;
    overflow: hidden;
    isolation: isolate;
  }
  .video-card-thumb::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 22%, transparent 60%, rgba(0,0,0,0.7) 100%),
      repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,0.025) 3px 4px);
    z-index: 1;
    pointer-events: none;
  }
  .video-card-thumb--blank {
    background:
      repeating-linear-gradient(45deg, #1a1a1a 0 8px, #2a2a2a 8px 9px),
      var(--ink);
  }
  .video-card-thumb--blank::after {
    content: "NO PREVIEW";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.35);
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    z-index: 2;
  }
  .video-card-overlay-tag {
    position: absolute;
    top: 12px; left: 12px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.12);
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.92);
    text-transform: uppercase;
  }
  .vc-tag-key { color: var(--hot); font-weight: 800; }
  .vc-tag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--hot);
    animation: vcPulse 1.6s ease-in-out infinite;
  }
  @keyframes vcPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .vc-tag-provider { color: rgba(255,255,255,0.7); }
  .video-card-play {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 76px; height: 76px;
    background: var(--bg);
    color: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 4;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s, color 0.15s;
    padding: 0;
  }
  .video-card-play svg { margin-left: 4px; }
  .video-card:hover .video-card-play {
    transform: scale(1.12);
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .video-card-cta-strip {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 3;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transform: translateY(100%);
    transition: transform 0.22s ease;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.85));
  }
  .video-card:hover .video-card-cta-strip { transform: translateY(0); }
  .vc-strip-arrow { font-size: 14px; }
  .video-card-meta {
    background: var(--bg);
    color: var(--ink);
    padding: 11px 14px 12px;
    border-top: 1px solid var(--ink);
  }
  .video-card-title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }
  .video-card-eyebrow {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .video-card-provider {
    font-family: "Geist Mono", monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    border: 1px solid var(--ink-3);
    padding: 2px 7px;
  }
  .video-card-url {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    color: var(--ink-4);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  /* Empty state — filmstrip frame with corner registration marks */
  .video-empty { margin-top: 6px; }
  .video-empty-frame {
    position: relative;
    background:
      repeating-linear-gradient(0deg, transparent 0 18px, rgba(10,10,10,0.04) 18px 19px),
      var(--paper);
    border: 1px dashed var(--ink-3);
    padding: 28px 24px;
    text-align: center;
    aspect-ratio: 16 / 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .video-empty-corner {
    position: absolute;
    width: 12px; height: 12px;
    border: 1.5px solid var(--ink);
  }
  .video-empty-corner.tl { top: 6px; left: 6px; border-right: 0; border-bottom: 0; }
  .video-empty-corner.tr { top: 6px; right: 6px; border-left: 0; border-bottom: 0; }
  .video-empty-corner.bl { bottom: 6px; left: 6px; border-right: 0; border-top: 0; }
  .video-empty-corner.br { bottom: 6px; right: 6px; border-left: 0; border-top: 0; }
  .video-empty-stamp {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding: 4px 12px;
    border: 1px solid var(--ink-3);
  }
  .video-empty-hint {
    font-family: "Geist", sans-serif;
    font-size: 12px;
    color: var(--ink-3);
    max-width: 360px;
    line-height: 1.5;
  }

  /* Edit row sits under the card or empty state */
  .video-edit-row {
    display: flex;
    gap: 0;
    align-items: stretch;
    margin-top: 10px;
    border: 1px solid var(--ink);
    background: white;
  }
  .video-edit-label {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: white;
    background: var(--ink);
    padding: 0 14px;
    display: flex;
    align-items: center;
  }
  .video-edit-row input {
    flex: 1;
    padding: 9px 12px;
    border: 0;
    background: transparent;
    font-family: "Geist Mono", monospace;
    font-size: 11.5px;
    color: var(--ink);
    min-width: 0;
  }
  .video-edit-row input::placeholder { color: var(--ink-4); font-weight: 500; }
  .video-edit-row input:focus { outline: none; background: #fffce8; }
  .video-edit-row .video-clear {
    background: transparent;
    border: 0;
    border-left: 1px solid var(--line);
    color: var(--ink-4);
    cursor: pointer;
    font-size: 12px;
    padding: 0 14px;
    font-family: "Geist Mono", monospace;
    font-weight: 700;
  }
  .video-edit-row .video-clear:hover { color: white; background: var(--hot); }

  /* === WATCH PILL — sits in the row meta line, ink-on-paper, hot accent dot === */
  .video-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px 2px 7px;
    border-radius: 0;
    background: var(--ink);
    color: white;
    border: 1px solid var(--ink);
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, transform 0.1s;
  }
  .video-pill:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-1px); }
  .video-pill svg { color: var(--hot); flex-shrink: 0; }

  /* === VIDEO MODAL — projector reveal, ink frame with paper bezel === */
  .video-modal-bg {
    position: fixed; inset: 0;
    background: rgba(10, 10, 10, 0.94);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 32px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    animation: vmFade 0.2s ease;
  }
  @keyframes vmFade { from { opacity: 0; } to { opacity: 1; } }
  .video-modal-bg.visible { display: flex; }
  .video-modal {
    background: #000;
    border: 4px solid var(--bg);
    width: 100%;
    max-width: 1180px;
    aspect-ratio: 16 / 9;
    position: relative;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255,255,255,0.05);
    animation: vmZoom 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes vmZoom {
    from { transform: scale(0.94); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .video-modal iframe { width: 100%; height: 100%; border: 0; display: block; }
  .video-modal-close {
    position: absolute;
    top: -48px; right: 0;
    background: var(--bg);
    color: var(--ink);
    border: 0;
    padding: 8px 18px;
    font-family: "Geist Mono", monospace;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .video-modal-close:hover { background: var(--hot); color: white; }
  .video-modal-strip {
    position: absolute;
    top: -48px; left: 0;
    color: var(--ink-4);
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
  }
  .video-modal-strip::before {
    content: "";
    width: 6px; height: 6px;
    background: var(--hot);
    border-radius: 50%;
    animation: vcPulse 1.6s ease-in-out infinite;
  }

  /* === BUNDLE PILL + INVOICE STATUS PILL === */
  .bundle-pill {
    background: rgba(0, 64, 200, 0.08);
    color: var(--accent);
    border: 1px solid rgba(0, 64, 200, 0.2);
    padding: 2px 8px;
    border-radius: 999px;
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .inv-pill {
    padding: 2px 9px;
    border-radius: 999px;
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: 1px solid;
    white-space: nowrap;
  }
  .inv-pill.invoiced { background: #d1fadf; color: #00461b; border-color: #008836; }
  .inv-pill.billed   { background: #fff3cd; color: #7c2d12; border-color: #d96a00; }
  .inv-pill.notinv   { background: #f4f4f4; color: var(--ink-3); border-color: var(--line); }

  /* === INVOICES SECTION — accounting ledger, paper-and-ink ===
     Reads like a ruled accounts page. No card backgrounds — bold rules,
     tabular monospace numbers, status as a stamped tag. */
  .invoices-wrap {
    margin-top: 56px;
    padding-top: 28px;
    border-top: 3px double var(--ink);
  }
  .invoices-hdr-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 16px;
  }
  .invoices-hdr {
    font-family: "Instrument Serif", "Geist", serif;
    font-size: 44px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }
  .invoices-meta-strip {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-bottom: 1px solid var(--ink-3);
    padding-bottom: 4px;
  }
  .invoices-sub {
    color: var(--ink-3);
    margin-bottom: 28px;
    font-size: 13px;
    font-family: "Geist", sans-serif;
    max-width: 640px;
    line-height: 1.55;
  }
  .invoice-card {
    border: 0;
    border-top: 1px solid var(--ink);
    padding: 24px 0 0;
    margin-bottom: 32px;
    background: transparent;
    border-radius: 0;
  }
  .invoice-card.paid, .invoice-card.sent, .invoice-card.draft { background: transparent; }
  .invoice-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: baseline;
    margin-bottom: 18px;
  }
  .invoice-num {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 4px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .invoice-client {
    font-family: "Instrument Serif", serif;
    font-size: 28px;
    font-weight: 400;
    margin-top: 2px;
    line-height: 1.1;
  }
  .invoice-total-stack { text-align: right; }
  .invoice-total {
    font-family: "Geist Mono", monospace;
    font-size: 30px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .invoice-status-tag {
    display: inline-block;
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 0;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-top: 8px;
    border: 1px solid var(--ink);
  }
  .invoice-status-tag.paid { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .invoice-status-tag.sent { background: var(--hot); color: white; border-color: var(--hot); }
  .invoice-status-tag.draft { background: transparent; color: var(--ink-3); border-color: var(--ink-3); }
  .bundle-list {
    margin-top: 4px;
    padding-left: 0;
    list-style: none;
    border-top: 1px solid var(--line);
  }
  .bundle-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
    align-items: baseline;
  }
  .bundle-row:last-child {
    border-bottom: 1px solid var(--ink);
  }
  .bundle-key {
    font-family: "Geist Mono", monospace;
    font-weight: 700;
    min-width: 56px;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.04em;
    padding-top: 1px;
  }
  .bundle-label {
    font-family: "Geist", sans-serif;
    font-weight: 700;
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.3;
  }
  .bundle-detail {
    font-family: "Geist", sans-serif;
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 4px;
    line-height: 1.55;
  }
  .bundle-amt {
    font-family: "Geist Mono", monospace;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    color: var(--ink);
    text-align: right;
    min-width: 70px;
  }
  .bundle-items {
    grid-column: 2 / 4;
    margin-top: 8px;
    padding-left: 0;
    font-size: 12px;
    color: var(--ink-2);
    list-style: none;
    border-left: 2px solid var(--paper);
    padding-left: 12px;
  }
  .bundle-items li {
    padding: 3px 0;
    line-height: 1.5;
    font-family: "Geist Mono", monospace;
    font-size: 11.5px;
    color: var(--ink-3);
    position: relative;
    padding-left: 14px;
  }
  .bundle-items li::before {
    content: "└";
    position: absolute;
    left: 0;
    color: var(--line-strong);
    font-weight: 700;
  }
  .bundle-items li:not(:last-child)::before { content: "├"; }
  @media (max-width: 640px) {
    .invoice-row { grid-template-columns: 1fr; }
    .invoice-total-stack { text-align: left; }
    .bundle-row { grid-template-columns: auto 1fr; }
    .bundle-amt { grid-column: 2; text-align: left; padding-top: 4px; }
  }

  /* === DELIVERED BADGE (invoiced + shipped) === */
  .delivered-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: "Geist", sans-serif;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--green);
    color: white;
    padding: 5px 10px 5px 8px;
    border-radius: 999px;
    box-shadow: 0 2px 0 #00461b;
    margin-left: 6px;
    white-space: nowrap;
  }
  .delivered-badge .chk {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: white;
    color: var(--green);
    font-weight: 900;
    font-size: 12px;
    line-height: 1;
  }
  .item.is-delivered .item-title { color: var(--ink-2); }
  .item.is-delivered .item-title::before { content: "✓  "; color: var(--green); font-weight: 900; }

  /* === CHECKLIST ITEM (collapsible test plan) === */
  .checklist-wrap {
    margin-top: 14px;
    padding: 16px 18px 18px;
    background: linear-gradient(180deg, #fffbeb 0%, #fef9c3 100%);
    border: 2px solid #facc15;
    border-radius: 12px;
    animation: slideDown 0.15s ease-out;
  }
  .checklist-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }
  .checklist-toggle {
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #713f12;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .checklist-toggle .chev { transition: transform 0.2s; display: inline-block; }
  .checklist-wrap.collapsed .chev { transform: rotate(-90deg); }
  .checklist-wrap.collapsed .checklist-body { display: none; }
  .checklist-progress {
    font-family: "Geist Mono", monospace;
    font-size: 12px;
    font-weight: 700;
    color: #7c2d12;
    background: white;
    border: 1px solid #facc15;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .checklist-progress.done { background: var(--green); color: white; border-color: var(--green); }
  .checklist-body { display: flex; flex-direction: column; gap: 2px; }
  .checklist-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 8px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .checklist-row:hover { background: rgba(255,255,255,0.55); }
  .checklist-row input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border: 2.5px solid #713f12;
    border-radius: 5px;
    background: white;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: transform 0.14s ease-out, background 0.14s, border-color 0.14s;
    margin-top: 1px;
  }
  .checklist-row input[type="checkbox"]:hover { transform: scale(1.05); border-color: var(--green); }
  .checklist-row input[type="checkbox"]:checked {
    background: var(--green);
    border-color: var(--green);
    animation: checkPop 0.22s ease-out;
  }
  .checklist-row input[type="checkbox"]:checked::after {
    content: "✓";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 15px; font-weight: 900; line-height: 1;
  }
  .checklist-row label {
    flex: 1;
    font-size: 14.5px;
    font-weight: 500;
    color: #451a03;
    line-height: 1.45;
    cursor: pointer;
  }
  .checklist-row.done label {
    text-decoration: line-through;
    color: var(--ink-4);
    opacity: 0.7;
  }
  .checklist-row.done { background: rgba(16, 136, 54, 0.07); }
  .checklist-bar {
    height: 6px;
    background: rgba(113, 63, 18, 0.15);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .checklist-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #facc15 0%, var(--green) 100%);
    border-radius: 999px;
    transition: width 0.22s ease-out;
  }

  /* === CATEGORY TAG === */
  .cat {
    display: inline-block;
    font-family: "Geist", sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink);
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--paper);
    border: 1px solid var(--line);
  }
  .cat-feature { background: #ede9fe; color: #4c1d95; border-color: #c4b5fd; }
  .cat-fix { background: #ffedd5; color: #7c2d12; border-color: #fdba74; }
  .cat-compliance { background: #ffe4e6; color: #881337; border-color: #fda4af; }
  .cat-data { background: #ccfbf1; color: #134e4a; border-color: #5eead4; }
  .cat-content { background: #fef9c3; color: #713f12; border-color: #fde047; }
  .cat-priority {
    background: #fef3c7;
    color: #92400e;
    border-color: #f59e0b;
    font-weight: 800;
    box-shadow: 0 0 0 1px #f59e0b;
  }
  /* Priority rows get a left rail + subtle warm highlight so Alejandra spots them instantly */
  .item[data-category="priority"] {
    background: linear-gradient(90deg, #fffbeb 0%, transparent 60%);
    border-left: 3px solid #f59e0b;
  }
  .item[data-category="priority"] .item-title { font-weight: 700; }

  /* === NOTES === */
  .notes-section {
    margin-top: 18px;
    margin-left: 0;
    padding: 18px 20px;
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 12px;
    animation: slideDown 0.15s ease-out;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .note {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
    font-size: 15px;
    line-height: 1.5;
  }
  .note:last-of-type { border-bottom: 0; }
  /* Big custom checkbox with pop animation */
  .note .check-wrap { position: relative; display: inline-block; flex-shrink: 0; margin-top: 1px; }
  .note input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    border: 3px solid var(--ink);
    border-radius: 6px;
    background: white;
    cursor: pointer;
    position: relative;
    transition: transform 0.14s ease-out, background 0.14s, border-color 0.14s;
  }
  .note input[type="checkbox"]:hover { transform: scale(1.05); border-color: var(--green); }
  .note input[type="checkbox"]:checked {
    background: var(--green);
    border-color: var(--green);
    transform: scale(1);
    animation: checkPop 0.22s ease-out;
  }
  @keyframes checkPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  .note input[type="checkbox"]:checked::after {
    content: "✓";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    font-weight: 900;
    line-height: 1;
  }
  .note.resolved .note-text { opacity: 0.4; text-decoration: line-through; }
  .note-text { flex: 1; color: var(--ink); font-weight: 500; }
  .note-meta {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-3);
    margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .note-add {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 2px solid var(--line);
  }
  .note-add-row { display: flex; gap: 10px; }
  .note-add input {
    flex: 1;
    border: 2px solid var(--line);
    padding: 14px 16px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    background: white;
    color: var(--ink);
    outline: none;
    border-radius: 8px;
    transition: border-color 0.15s;
  }
  .note-add input:focus { border-color: var(--deal-color, var(--accent)); }
  .note-add input::placeholder { color: var(--ink-4); }
  .note-add-btn {
    background: var(--ink);
    color: white;
    border: 0;
    padding: 0 20px;
    font-family: "Geist", sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
  }
  .note-add-btn:hover { background: var(--green); }
  .note-add-btn:active { transform: scale(0.94); }

  /* === MODAL === */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
    animation: fadein 0.15s ease-out;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    border: 3px solid var(--ink);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: pop 0.13s ease-out;
  }
  @keyframes pop { from { transform: scale(0.97) translateY(4px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal h3 {
    font-family: "Geist", sans-serif;
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 4px;
    color: var(--ink);
    letter-spacing: -0.025em;
  }
  .modal-sub {
    font-family: "Geist", sans-serif;
    font-size: 14px;
    color: var(--ink-2);
    font-weight: 500;
    margin-bottom: 22px;
  }
  .modal label {
    display: block;
    font-family: "Geist", sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink);
    margin: 14px 0 6px;
    font-weight: 700;
  }
  .modal input, .modal select {
    width: 100%;
    border: 2px solid var(--line);
    padding: 10px 12px;
    font-family: "Geist", sans-serif;
    font-size: 15px;
    font-weight: 500;
    background: white;
    color: var(--ink);
    outline: none;
    border-radius: 6px;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
  .modal-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
  .modal-actions button {
    padding: 12px 22px;
    border-radius: 8px;
    font-family: "Geist", sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid var(--ink);
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
  }
  .btn-secondary { background: white; color: var(--ink); }
  .btn-secondary:hover { background: var(--paper); }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }

  /* === PROGRESS BARS === */
  .progress-bar {
    height: 10px;
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    overflow: hidden;
    width: 100%;
    margin-top: 12px;
  }
  .progress-fill {
    height: 100%;
    background: white;
    border-radius: 999px;
    transition: width 0.3s ease-out;
    box-shadow: 0 0 12px rgba(255,255,255,0.5);
  }
  .progress-deal { display: block; }
  .progress-version {
    height: 6px;
    background: var(--line);
    margin-top: 6px;
  }
  .progress-version .progress-fill {
    background: var(--deal-color, var(--green));
    box-shadow: none;
  }
  .progress-pct {
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: white;
    margin-left: 8px;
  }
  .progress-pct-version {
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-2);
    margin-left: 8px;
  }
  /* Global progress collapsed into the brief ribbon — no separate widget */
  .global-progress { display: none; }

  /* === EMPTY === */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-2);
    font-weight: 500;
    font-size: 15px;
  }
  .empty-mark {
    font-family: "Geist", serif;
    font-size: 56px;
    font-weight: 900;
    color: var(--line);
    margin-bottom: 8px;
  }

  /* === USERS MODAL === */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: flex-start; justify-content: center;
    padding: 60px 20px 40px;
    z-index: 1000;
    overflow-y: auto;
  }
  .modal-backdrop.visible { display: flex; }
  .modal-card {
    background: white;
    border-radius: 16px;
    max-width: 720px;
    width: 100%;
    padding: 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
  }
  .modal-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--line);
  }
  .modal-head h2 { font-size: 20px; font-weight: 800; }
  .modal-close { background: transparent; border: 0; font-size: 22px; cursor: pointer; color: var(--ink-3); }
  .modal-close:hover { color: var(--hot); }
  .user-row {
    display: grid;
    grid-template-columns: 1fr 130px auto;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .user-row:last-child { border-bottom: 0; }
  .user-name { font-weight: 700; font-size: 14px; }
  .user-meta { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .user-cell select {
    font-family: "Geist", sans-serif; font-size: 12px; padding: 5px 8px;
    border: 1px solid var(--line); border-radius: 6px; background: white;
  }
  .user-cell-actions { display: flex; gap: 6px; }
  .user-btn {
    font-family: "Geist", sans-serif; font-size: 12px; font-weight: 600;
    padding: 6px 10px; border: 1px solid var(--line); background: white; border-radius: 6px; cursor: pointer;
  }
  .user-btn:hover:not(:disabled) { border-color: var(--ink); }
  .user-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .user-btn.danger:hover:not(:disabled) { border-color: var(--hot); color: var(--hot); }
  .user-form {
    margin-top: 22px; padding-top: 18px; border-top: 2px solid var(--ink);
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .user-form h3 { grid-column: 1 / -1; font-size: 14px; font-weight: 800; margin-bottom: 4px; }
  .user-form input, .user-form select {
    font-family: "Geist", sans-serif; font-size: 13px; padding: 8px 10px;
    border: 1px solid var(--line); border-radius: 6px; background: white;
  }
  .user-form input:focus, .user-form select:focus { outline: 0; border-color: var(--ink); }
  .user-form .form-submit {
    grid-column: 1 / -1;
    background: var(--ink); color: white; font-weight: 700; padding: 10px;
    border: 0; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .user-form .form-submit:hover { background: var(--accent); }

  /* assignee chip on items */
  .assignee-chip {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
    background: var(--paper); border: 1px solid var(--line); color: var(--ink-2);
  }
  .assignee-chip.unassigned { color: var(--ink-4); font-style: italic; }
  .assignee-select {
    font-family: "Geist", sans-serif; font-size: 11px; padding: 2px 6px;
    border: 1px solid var(--line); border-radius: 6px; background: white;
  }

  /* === DENSITY SEGMENTED + GROUP-BY (filterbar controls) === */
  .density-seg {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 2px;
    background: white;
    gap: 0;
  }
  .density-seg button {
    background: transparent;
    border: 0;
    color: var(--ink-3);
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    line-height: 1;
  }
  .density-seg button:hover { color: var(--ink); }
  .density-seg button.is-active {
    background: var(--ink);
    color: white;
  }
  .density-seg .seg-icon {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    line-height: 1;
    opacity: 0.85;
  }

  /* === LINE MODE — single tight row, paper not grid === */
  .item.line {
    padding: 0;
    border: 0;
    border-radius: 0;
    margin: 0;
    background: transparent;
    box-shadow: none;
    border-bottom: 1px solid var(--line);
    transition: background 0.08s;
  }
  .item.line:hover {
    background: rgba(29, 62, 239, 0.025);
  }
  .item.line:last-child { border-bottom: 0; }
  .item.line .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px 8px 6px;
    min-height: 36px;
    position: relative;
  }
  .item.line.is-selected {
    box-shadow: inset 3px 0 0 var(--ink);
  }
  .item.line .reorder-col { display: none; }
  .item.line .item-pillstack {
    flex-direction: row;
    width: auto;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  /* Compact status as a colored dot, not a full pill */
  .item.line .pill {
    width: 12px;
    height: 12px;
    padding: 0;
    border-radius: 50%;
    border: 0;
    box-shadow: none;
    overflow: hidden;
    text-indent: -9999px;
    flex-shrink: 0;
    background-clip: content-box;
  }
  .item.line .pill .dot { display: none; }
  .item.line .cat { display: none; }
  /* Line mode: title + meta-row inline (row direction), left-aligned */
  .item.line .item-main { padding: 0; min-width: 0; flex: 1; display: flex; flex-direction: row; align-items: center; gap: 14px; }
  .item.line .item-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    margin: 0;
    padding: 1px 4px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item.line .item-title:focus { background: var(--paper); white-space: normal; overflow: visible; text-overflow: clip; }
  .item.line .item-meta {
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    margin: 0;
    font-size: 11.5px;
    color: var(--ink-3);
    align-items: center;
    flex-shrink: 0;
  }
  /* In line mode hide the chatty meta items, keep only the essentials */
  .item.line .item-meta .source-link,
  .item.line .item-meta .commit,
  .item.line .item-meta > .meta-item:not(.notes-link):not(.attach-link),
  .item.line .item-meta .delivered-badge {
    display: none;
  }
  .item.line .version-chip { font-size: 10px; padding: 1px 6px; }
  .item.line .assignee-select { font-size: 10.5px; padding: 1px 4px; max-width: 160px; }
  .item.line .notes-link, .item.line .attach-link { font-size: 11px; }
  .item.line .actions-always { flex-shrink: 0; }
  .item.line .lifecycle { gap: 1px; }
  .item.line .lc-step { width: 18px; height: 18px; font-size: 9px; }
  .item.line .lc-sep { width: 4px; }
  .item.line .item-actions { opacity: 0; }
  .item.line:hover .item-actions { opacity: 1; }
  .item.line .icon-btn {
    width: 22px; height: 22px; font-size: 14px;
    background: transparent; border: 0; color: var(--ink-3); cursor: pointer; border-radius: 4px;
  }
  .item.line .icon-btn:hover { background: var(--paper); color: var(--hot); }
  .item.line .drag-handle { font-size: 12px; padding: 0 1px; }
  /* Hide attachments thumb-strip when line mode is collapsed; show in drawer instead */
  .item.line:not(.is-expanded) .attachments-section,
  .item.line:not(.is-expanded) .checklist-wrap,
  .item.line:not(.is-expanded) .context-panel,
  .item.line:not(.is-expanded) .notes-section { display: none; }

  /* Per-row chevron expand toggle (▸ closed, ▾ open) */
  .row-toggle {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--ink-3);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  .row-chev {
    display: inline-block;
    font-family: "Geist Mono", monospace;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    transition: transform 0.16s ease-out;
    transform: translateY(-1px);
  }
  .row-toggle:hover { border-color: var(--line); color: var(--ink); background: var(--paper); }
  .row-toggle.is-open .row-chev { transform: rotate(90deg) translateX(-1px); }
  .row-toggle.is-open { color: var(--ink); }

  /* === DRAWER — editorial expanded view (paper + ink + electric blue) === */
  .row-drawer {
    position: relative;
    padding: 18px 22px 22px 28px;
    background: linear-gradient(180deg, #faf8f3 0%, #f5f3ef 100%);
    border-bottom: 1px solid var(--line);
    animation: drawerSlide 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  /* Left accent bar — visually ties the drawer to its parent row */
  .row-drawer::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0.85;
  }
  .item.line.is-expanded { background: rgba(29, 62, 239, 0.025); }
  .item.line.is-expanded .row-drawer { display: block; }
  @keyframes drawerSlide {
    from { opacity: 0; transform: translateY(-6px); max-height: 0; }
    to   { opacity: 1; transform: translateY(0); max-height: 2000px; }
  }

  /* Two-column responsive grid: description spans full width on top,
     then meta + attachments side by side, then notes full width */
  .drawer-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
    grid-auto-flow: dense;
    gap: 18px 22px;
    align-items: start;
  }
  .drawer-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  .drawer-section.full { grid-column: 1 / -1; }
  .drawer-section.right { grid-column: 2 / 3; }

  .drawer-label {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-3);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .drawer-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
    opacity: 0.7;
  }
  .drawer-label .lbl-count {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    color: var(--ink-4);
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  /* Description — feels like a writing surface */
  .drawer-desc {
    font-family: "Geist", sans-serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.6;
    background: white;
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid var(--line);
    white-space: pre-wrap;
    outline: none;
    cursor: text;
    min-height: 60px;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .drawer-desc:hover { border-color: var(--ink-3); }
  .drawer-desc:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(29, 62, 239, 0.1);
  }
  .drawer-desc:empty:before {
    content: "Click to add a description…";
    color: var(--ink-4);
    font-style: italic;
  }

  /* Meta — clean key:value pairs in a quiet card */
  .drawer-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 14px;
    background: white;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--line);
    font-family: "Geist", sans-serif;
    font-size: 12.5px;
    color: var(--ink-2);
    align-items: baseline;
  }
  .drawer-meta-key {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
    white-space: nowrap;
  }
  .drawer-meta-val { color: var(--ink); font-weight: 500; min-width: 0; word-break: break-word; }
  .drawer-meta-val .pillette {
    display: inline-block;
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 1px 7px;
    border-radius: 4px;
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
  }
  .drawer-meta-val .ico { font-size: 11px; margin-right: 3px; opacity: 0.7; }

  /* === STATUS PICKER (drawer) — 6 chips, one click sets status === */
  .status-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: white;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px 7px 10px;
    font-family: "Geist", sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-3);
    background: var(--paper);
    border: 1.5px solid transparent;
    border-radius: 999px;
    cursor: pointer;
    line-height: 1;
    transition: background 0.1s, color 0.1s, border-color 0.1s, transform 0.08s;
    white-space: nowrap;
  }
  .status-chip-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.55;
    flex-shrink: 0;
    transition: opacity 0.1s, background 0.1s;
  }
  .status-chip:hover { color: var(--ink); border-color: var(--line); background: white; }
  .status-chip:active { transform: scale(0.96); }
  .status-chip.is-active.s-open        { background: var(--ink); color: white; border-color: var(--ink); }
  .status-chip.is-active.s-in_flight   { background: var(--orange); color: white; border-color: var(--orange); }
  .status-chip.is-active.s-shipped     { background: var(--accent); color: white; border-color: var(--accent); }
  .status-chip.is-active.s-tested_pass { background: var(--green); color: white; border-color: var(--green); }
  .status-chip.is-active.s-tested_fail { background: var(--hot); color: white; border-color: var(--hot); }
  .status-chip.is-active.s-wont_do     { background: var(--ink-4); color: white; border-color: var(--ink-4); }
  .status-chip.is-active .status-chip-dot { opacity: 1; background: white; }

  /* Lifecycle row inside drawer — full-width strip */
  .drawer-lifecycle {
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .drawer-lifecycle .lc-stage {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
    min-width: 56px;
  }
  .drawer-lifecycle .lc-stage-name {
    font-family: "Geist Mono", monospace;
    font-size: 9.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
  }
  .drawer-lifecycle .lc-stage-date {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    color: var(--ink-3);
    height: 12px;
    line-height: 1;
  }
  .drawer-lifecycle .lc-arrow {
    color: var(--ink-4);
    font-size: 14px;
    line-height: 1;
    transform: translateY(-7px);
  }

  /* Source context — code-like, but soft */
  .drawer-context {
    background: #1a1a1a;
    color: #e8e6e0;
    padding: 12px 16px;
    border-radius: 8px;
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    max-height: 220px;
    overflow: auto;
    border: 1px solid #0a0a0a;
  }

  /* Attachments dropzone hint when empty */
  .drawer-dropzone {
    background: white;
    border: 2px dashed var(--line);
    border-radius: 8px;
    padding: 18px;
    text-align: center;
    color: var(--ink-4);
    font-size: 12.5px;
    font-family: "Geist", sans-serif;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .drawer-dropzone:hover { border-color: var(--accent); color: var(--accent); background: rgba(29, 62, 239, 0.025); }
  .drawer-dropzone .dz-icon { font-size: 18px; display: block; margin-bottom: 4px; opacity: 0.6; }

  /* Notes inside drawer — less padding, no double border */
  .row-drawer .notes-section {
    margin: 0;
    padding: 12px 14px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    animation: none;
  }
  .row-drawer .note { padding: 10px 0; font-size: 13px; }
  .row-drawer .note input[type="checkbox"] { width: 20px; height: 20px; border-width: 2px; }
  .row-drawer .note-meta { font-size: 11px; }
  .row-drawer .note-add { margin-top: 8px; }
  .row-drawer .note-add-row {
    display: flex;
    gap: 6px;
    align-items: stretch;
  }
  .row-drawer .note-add-row input {
    flex: 1;
    font-family: "Geist", sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--paper);
    color: var(--ink);
    transition: border-color 0.12s, background 0.12s;
  }
  .row-drawer .note-add-row input:focus {
    outline: 0;
    border-color: var(--accent);
    background: white;
  }
  .row-drawer .note-add-btn {
    padding: 8px 16px;
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 700;
    background: var(--ink);
    color: white;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s, transform 0.08s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .row-drawer .note-add-btn:hover { background: var(--accent); }
  .row-drawer .note-add-btn:active { transform: scale(0.97); }

  /* Mobile: collapse drawer grid to single column */
  @media (max-width: 720px) {
    .row-drawer { padding: 14px 14px 16px 18px; }
    .drawer-grid { grid-template-columns: 1fr; gap: 14px; }
    .drawer-section.right { grid-column: 1 / -1; }
    .drawer-meta { grid-template-columns: 1fr; gap: 4px; }
    .drawer-meta-key { margin-top: 4px; }
  }

  /* === ADD-ITEM ROW (sits at the bottom of every group) === */
  .add-row-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: transparent;
    border: 0;
    border-top: 1px dashed var(--line);
    color: var(--ink-4);
    font-family: "Geist", sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 10px 12px 10px 6px;
    margin-top: 2px;
    cursor: pointer;
    text-align: left;
    transition: color 0.1s, background 0.1s, border-color 0.1s;
    border-radius: 0;
  }
  .add-row-btn:hover {
    color: var(--accent);
    background: rgba(29, 62, 239, 0.025);
    border-top-color: var(--accent);
  }
  .add-row-plus {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border: 1px solid currentColor;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
  }

  /* === GENERIC GROUP HEADER (used when groupBy is not "project") === */
