  .group-section { margin-bottom: 28px; }
  .group-hd {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 6px 8px;
    border-bottom: 1.5px solid var(--ink);
    margin-bottom: 4px;
    cursor: pointer;
    user-select: none;
  }
  .group-hd:hover { background: rgba(0,0,0,0.02); }
  .group-chev {
    font-family: "Geist Mono", monospace;
    font-size: 12px;
    color: var(--ink-3);
    transition: transform 0.16s ease-out;
    width: 14px;
    line-height: 1;
  }
  .group-section.collapsed .group-chev { transform: rotate(-90deg); }
  .group-section.collapsed .group-body { display: none; }
  .group-tag {
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: white;
    background: var(--group-color, var(--ink));
    padding: 3px 9px;
    border-radius: 4px;
    line-height: 1;
  }
  .group-name {
    font-family: "Geist", sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    flex: 1;
    letter-spacing: -0.01em;
  }
  .group-count {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-3);
    letter-spacing: 0.06em;
  }
  .group-body { padding-top: 4px; }

  /* === TABLET (≤960) === */
  @media (max-width: 960px) {
    .wrap { padding: 12px 18px 64px; }
    .item-pillstack { width: 120px; gap: 4px; }
    .att-thumb { width: 52px; height: 52px; }
    .attachments-section { padding-left: 0; gap: 5px; }
  }

  /* === MOBILE (≤720) === */
  @media (max-width: 720px) {
    /* Sticky role banner — collapsed for thumb-friendly layout */
    #role-banner {
      padding: 6px 14px !important;
      font-size: 10px !important;
      gap: 8px !important;
      flex-wrap: wrap;
    }
    #role-banner > span:first-child { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .wrap { padding: 12px 14px 80px; }

    /* Masthead — keep tight, just shrink */
    .masthead { gap: 8px; padding-bottom: 8px; margin-bottom: 12px; }
    .masthead-left { gap: 8px; flex-wrap: wrap; }
    h1.masthead-title { font-size: 15px; }
    #masthead-progress { font-size: 10px; }
    .add-btn { padding: 8px 14px; font-size: 12px; }

    /* Brief ribbon — horizontally scrollable on phone, no wrap */
    .brief {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 4px 0;
      font-size: 10px;
    }
    .brief::-webkit-scrollbar { display: none; }
    .brief-cell { flex-shrink: 0; padding: 3px 10px 3px 0; margin-right: 3px; }
    .brief-cell:not(:last-child)::after { margin-left: 10px; }
    .brief-num { font-size: 12px; }
    .brief-label { font-size: 9px; }

    /* Filter bar — search full width, selects wrap below */
    .filterbar { gap: 8px; margin-bottom: 16px; }
    .search-wrap { flex: 1 1 100%; min-width: 0; }
    .search-wrap input { font-size: 16px; padding: 10px 32px 10px 12px; } /* 16px stops iOS auto-zoom */
    .filter-select { font-size: 13px; padding: 8px 26px 8px 10px; flex: 1 1 auto; min-width: 0; }
    .bulk-toggle, .filter-reset { font-size: 12px; padding: 7px 10px; }

    /* Deal sections */
    .deal-name { font-size: 17px; }
    .deal-mini { display: none; }

    /* Item rows — pillstack collapses to a row above the title */
    .item-row { flex-direction: column; gap: 8px; }
    .item-pillstack {
      flex-direction: row;
      width: 100%;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .item-main { width: 100%; }
    .item-title { font-size: 15px; line-height: 1.35; }
    .item-meta { font-size: 12px; gap: 10px; margin-top: 6px; }
    .notes-section { margin-left: 0; }
    .item-actions { opacity: 1; } /* always show on touch */

    /* Lifecycle — slightly smaller on phone */
    .lifecycle { gap: 2px; }
    .lc-step { width: 22px; height: 22px; font-size: 10px; }

    /* Attachments — tighter */
    .att-thumb { width: 48px; height: 48px; }
    .att-thumb.is-file .att-icon { font-size: 18px; }
    .att-thumb.is-file .att-name { font-size: 7px; }
    .att-del { width: 18px; height: 18px; font-size: 12px; display: flex; } /* always visible on touch */

    /* Modals — full width with breathing room */
    .modal-card { max-width: calc(100vw - 24px); margin: 12px; padding: 16px; }
    .modal-head h2 { font-size: 18px; }

    /* Add-item form */
    .add-form input, .add-form select, .add-form textarea { font-size: 16px; } /* no iOS zoom */
  }

  /* === CONFIRM DIALOG (custom, fast, branded) === */
  .confirm-backdrop {
    position: fixed; inset: 0;
    background: rgba(10, 10, 10, 0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
    animation: fadein 0.1s ease-out;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .confirm-backdrop.open { display: flex; }
  .confirm-card {
    background: white;
    border-radius: 14px;
    padding: 22px 22px 18px;
    width: 100%;
    max-width: 380px;
    margin: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.28);
    animation: pop 0.13s ease-out;
    border: 1px solid var(--line);
  }
  .confirm-card h3 {
    font-family: "Geist", sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .confirm-card p {
    font-family: "Geist", sans-serif;
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--ink-2);
    margin: 0 0 18px;
  }
  .confirm-card .target {
    font-family: "Geist Mono", monospace;
    font-size: 12px;
    color: var(--ink);
    background: var(--paper);
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--line);
    margin: -6px 0 16px;
    word-break: break-word;
    max-height: 80px;
    overflow: auto;
  }
  .confirm-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .confirm-btn {
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--line);
    background: white;
    color: var(--ink-2);
    transition: background 0.1s, border-color 0.1s, transform 0.08s;
  }
  .confirm-btn:hover { border-color: var(--ink); color: var(--ink); }
  .confirm-btn:active { transform: scale(0.97); }
  .confirm-btn.danger {
    background: var(--hot);
    color: white;
    border-color: var(--hot);
  }
  .confirm-btn.danger:hover { background: #b30000; border-color: #b30000; color: white; }

  /* === ACCESSIBILITY — respect reduced motion preference === */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* === PHONE (≤480) — ultra-compact === */
  @media (max-width: 480px) {
    .wrap { padding: 10px 10px 80px; }
    h1.masthead-title { font-size: 14px; }
    .add-btn { padding: 7px 12px; font-size: 11px; }
    .add-btn .plus { font-size: 13px; }
    .deal-name { font-size: 16px; }
    .item { padding: 14px; }
    .item-title { font-size: 14.5px; }
    .lc-step { width: 22px; height: 22px; font-size: 10px; }
    .att-thumb { width: 56px; height: 56px; }
  }

  /* === TOUCH-FIRST UX — pointer-coarse means a touchscreen.
     Hide hover-only affordances, enlarge tap targets, prefer arrows over drag. === */
  @media (pointer: coarse) {
    /* HTML5 native drag-drop is broken on touch — hide handle, show big arrows */
    .drag-handle { display: none !important; }
    .reorder-col {
      opacity: 1 !important;
      gap: 2px;
      align-self: center;
    }
    .reorder-btn {
      min-width: 38px;
      min-height: 32px;
      font-size: 16px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      background: white;
    }
    .reorder-btn:hover, .reorder-btn:active {
      background: var(--paper);
      border-color: var(--ink);
    }
    /* Always show item actions and toggle on touch (no hover) */
    .item-actions { opacity: 1 !important; }
    .item.line .item-actions { opacity: 1 !important; }
    .row-toggle { width: 36px; height: 36px; }
    .row-chev { font-size: 18px; }
    /* Bigger tap-friendly chips */
    .status-chip { padding: 10px 14px 10px 12px; font-size: 12.5px; }
    .item-meta .notes-link, .item-meta .attach-link {
      padding: 8px 14px 8px 12px; font-size: 13px;
    }
    .att-thumb { width: 64px; height: 64px; }
    .att-del { display: flex !important; width: 22px; height: 22px; font-size: 14px; }
    /* Inputs/selects need 44px+ for thumbs */
    .assignee-select, .filter-select, .density-seg button {
      min-height: 38px;
      font-size: 14px;
    }
    .add-row-btn { padding: 16px 14px; font-size: 14px; }

    /* Bigger title hit area */
    .item.line .item-title { padding: 6px 4px; }

    .row-drawer .note-add-row input { padding: 12px 14px; font-size: 14px; min-height: 44px; }
    .row-drawer .note-add-btn { min-height: 44px; padding: 10px 18px; font-size: 13px; }
    /* Drawer description editor needs more breathing room */
    .drawer-desc { font-size: 15px; min-height: 80px; padding: 14px 16px; }
  }
</style>

<script>
// =====  AUTH  =====
const AUTH_TOKEN = localStorage.getItem("authToken") || localStorage.getItem("token");
if (!AUTH_TOKEN) {
  window.location.href = "/admin/login?next=/dev-tracker.html";
}
let CURRENT_USER = null;
async function loadCurrentUser() {
  try {
    const r = await fetch("/api/auth/me", { headers: { Authorization: "Bearer " + AUTH_TOKEN } });
    if (!r.ok) { localStorage.removeItem("authToken"); localStorage.removeItem("token"); window.location.href = "/admin/login?next=/dev-tracker.html"; return; }
    const data = await r.json();
    CURRENT_USER = data.user || data;
    document.documentElement.setAttribute("data-role", CURRENT_USER.role || "developer");
    const banner = document.getElementById("role-banner");
    if (banner) {
      const role = CURRENT_USER.role || "developer";
      const roleLabel = role === "owner" ? "OWNER" : role === "developer" ? "DEVELOPER" : role.toUpperCase();
      const displayId = CURRENT_USER.email || CURRENT_USER.username;
      // Single tracker — every signed-in user gets full controls
      banner.innerHTML = `<span>${CURRENT_USER.name ? CURRENT_USER.name + ' <span style="opacity:.4">·</span> ' : ''}<span style="opacity:.7">${displayId}</span> <span style="opacity:.5">·</span> <strong>${roleLabel}</strong></span><span style="display:flex;gap:14px;align-items:center;"><button onclick="openUsersModal()" style="background:transparent;border:0;color:inherit;text-decoration:underline;cursor:pointer;font-family:inherit;font-size:inherit;padding:0;">Manage developers</button><button onclick="devLogout()" style="background:transparent;border:0;color:inherit;text-decoration:underline;cursor:pointer;font-family:inherit;font-size:inherit;padding:0;">Log out</button></span>`;
      loadUsers();
    }
  } catch (e) {
    console.error("auth check failed", e);
  }
}
function devLogout() {
  localStorage.removeItem("authToken");
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "/admin/login";
}

// === Users (admin only) ===
let USERS = [];
async function loadUsers() {
  try {
    const r = await apiFetch("/api/dev-tracker/users");
    if (!r.ok) return;
    USERS = await r.json();
    if (typeof render === "function") render();
  } catch (e) { console.warn("loadUsers failed", e); }
}
function devUsernames() {
  return USERS.filter(u => u.role === "developer").map(u => u.username);
}
function openUsersModal() {
  const m = document.getElementById("users-modal");
  m.classList.add("visible");
  renderUsersList();
}
function closeUsersModal() {
  document.getElementById("users-modal").classList.remove("visible");
}
function renderUsersList() {
  const list = document.getElementById("users-list");
  list.innerHTML = USERS.map(u => `
    <div class="user-row">
      <div class="user-cell user-cell-main">
        <div class="user-name">${escapeHtml(u.name)}</div>
        <div class="user-meta">${escapeHtml(u.email)}</div>
      </div>
      <div class="user-cell">
        <select onchange="patchUser(${u.id}, { role: this.value })" ${u.id === CURRENT_USER.id ? "disabled" : ""}>
          <option value="developer" ${u.role==='developer'?'selected':''}>developer</option>
          <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
          <option value="owner" ${u.role==='owner'?'selected':''}>owner</option>
        </select>
      </div>
      <div class="user-cell user-cell-actions">
        <button class="user-btn" onclick="resetUserPassword(${u.id}, '${escapeHtml(u.email)}')">Reset password</button>
        <button class="user-btn danger" onclick="deleteUser(${u.id}, '${escapeHtml(u.email)}')" ${u.id === CURRENT_USER.id ? "disabled" : ""}>Delete</button>
      </div>
    </div>
  `).join("");
}
async function createUser(ev) {
  ev.preventDefault();
  const f = ev.target;
  const email = f.email.value.trim();
  const body = {
    username: email,           // username == email — single identifier
    name: f.name.value.trim(),
    email: email,
    password: f.password.value,
    role: f.role.value,
  };
  if (!body.email || !body.name || !body.password) return alert("Name, email, and password are required");
  try {
    const r = await apiFetch("/api/dev-tracker/users", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    if (!r.ok) { const e = await r.json(); return alert("Error: " + (e.error || "create failed")); }
    f.reset();
    await loadUsers();
    renderUsersList();
    alert("Created. Share these credentials with the developer:\n\nEmail: " + body.email + "\nPassword: " + body.password + "\nLogin URL: " + window.location.origin + "/admin/login");
  } catch (e) { alert("Error: " + e.message); }
}
async function patchUser(id, body) {
  try {
    const r = await apiFetch("/api/dev-tracker/users/" + id, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    if (!r.ok) { const e = await r.json(); return alert("Error: " + (e.error || "update failed")); }
    await loadUsers();
    renderUsersList();
  } catch (e) { alert("Error: " + e.message); }
}
async function resetUserPassword(id, username) {
  const pwd = prompt("New password for " + username + ":");
  if (!pwd) return;
  await patchUser(id, { password: pwd });
  alert("Password reset for " + username + ". New password: " + pwd);
}
async function deleteUser(id, username) {
  const ok = await confirmDialog({
    title: "Delete user?",
    message: "Their items will be unassigned. This can't be undone.",
    target: username,
    okLabel: "Delete user",
  });
  if (!ok) return;
  try {
    const r = await apiFetch("/api/dev-tracker/users/" + id, { method: "DELETE" });
    if (!r.ok) { const e = await r.json(); return alert("Error: " + (e.error || "delete failed")); }
    await loadUsers();
    renderUsersList();
  } catch (e) { alert("Error: " + e.message); }
}
// fetch wrapper that auto-adds Authorization header and handles 401
async function apiFetch(url, opts = {}) {
  const headers = Object.assign({}, opts.headers || {}, { Authorization: "Bearer " + AUTH_TOKEN });
  const r = await fetch(url, Object.assign({}, opts, { headers }));
  if (r.status === 401) {
    localStorage.removeItem("authToken"); localStorage.removeItem("token");
    window.location.href = "/admin/login?next=/dev-tracker.html";
    throw new Error("unauthorized");
  }
  return r;
}

// Cheap diff hash — skips render if API payload unchanged.
// Includes only fields that change (status, lifecycle, notes count, attachment count).
let _lastPayloadHash = null;
function payloadFingerprint(projects) {
  const parts = [];
  for (const k of Object.keys(projects).sort()) {
    for (const it of projects[k]) {
      parts.push(it.id + ":" + it.status + ":" + (it.delivered_at||"") + ":" + (it.invoiced_at||"") + ":" + (it.paid_at||"") + ":" + (it.assignee||"") + ":" + (it.notes?.length||0) + ":" + (it.attachments?.length||0) + ":" + (it.updated_at||""));
    }
  }
  return parts.join("|");
}
let invoices = [];
let invoiceStatusByNum = {};
async function load(force) {
  try {
    const [r, ri] = await Promise.all([
      apiFetch("/api/dev-tracker/items"),
      apiFetch("/api/dev-tracker/invoices").catch(() => null),
    ]);
    const next = await r.json();
    if (ri && ri.ok) {
      invoices = await ri.json();
      invoiceStatusByNum = {};
      for (const inv of invoices) invoiceStatusByNum[inv.invoice_number] = inv.status;
    }
    // Hash includes density/groupBy/expandedRows so polling never wipes a drawer
    const hash = payloadFingerprint(next) + "|d=" + filters.density + "|g=" + filters.groupBy + "|e=" + expandedRows.size + "|inv=" + invoices.length;
    // Skip re-render if nothing meaningful changed and no flash is queued
    if (!force && hash === _lastPayloadHash && pendingFlash.size === 0) {
      projects = next; // still update reference for actions
      return;
    }
    _lastPayloadHash = hash;
    projects = next;
    document.getElementById("project-list").innerHTML = Object.keys(projects).map(k => `<option value="${k}">`).join("");
    render();
  } catch (e) {
    console.warn("load failed:", e);
  }
}

}

// === VIDEO EMBED (Loom + YouTube) ===
function videoEmbedUrl(url) {
  if (!url) return null;
  const u = url.trim();
  // Loom share/embed
  let m = u.match(/loom\.com\/share\/([a-z0-9]+)/i);
  if (m) return `https://www.loom.com/embed/${m[1]}?hide_owner=true&hideEmbedTopBar=true`;
  if (u.includes("loom.com/embed/")) return u;
  // YouTube
  m = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
  if (m) return `https://www.youtube.com/embed/${m[1]}`;
  if (u.includes("youtube.com/embed/")) return u;
  // Vimeo
  m = u.match(/vimeo\.com\/(\d+)/);
  if (m) return `https://player.vimeo.com/video/${m[1]}`;
  return u;
}
// Returns a thumbnail image URL for known providers; null if no preview available
function videoThumbnailUrl(url) {
  if (!url) return null;
  const u = url.trim();
  // Loom share — exposes a public thumbnail jpg
  let m = u.match(/loom\.com\/share\/([a-z0-9]+)/i);
  if (m) return `https://cdn.loom.com/sessions/thumbnails/${m[1]}-with-play.gif`;
  m = u.match(/loom\.com\/embed\/([a-z0-9]+)/i);
  if (m) return `https://cdn.loom.com/sessions/thumbnails/${m[1]}-with-play.gif`;
  // YouTube
  m = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]+)/);
  if (m) return `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg`;
  return null;
}
function videoProviderLabel(url) {
  if (!url) return "video";
  if (/loom\.com/i.test(url)) return "Loom";
  if (/youtube\.com|youtu\.be/i.test(url)) return "YouTube";
  if (/vimeo\.com/i.test(url)) return "Vimeo";
  return "video";
}
function openVideoModal(url) {
  const embed = videoEmbedUrl(url);
  if (!embed) return;
  document.getElementById("video-modal-iframe").src = embed;

// === Custom confirm dialog (Promise-based, replaces native confirm()) ===
let _confirmResolve = null;
function confirmDialog({ title = "Confirm", message = "Are you sure?", target = null, okLabel = "Delete", okIsDanger = true } = {}) {
  return new Promise((resolve) => {
    _confirmResolve = resolve;
    document.getElementById("confirm-title").textContent = title;
    document.getElementById("confirm-message").textContent = message;
    const tgt = document.getElementById("confirm-target");
    if (target) { tgt.textContent = target; tgt.style.display = "block"; } else { tgt.style.display = "none"; }
    const okBtn = document.getElementById("confirm-ok");
    okBtn.textContent = okLabel;
    okBtn.classList.toggle("danger", okIsDanger);
    document.getElementById("confirm-backdrop").classList.add("open");
    setTimeout(() => okBtn.focus(), 30);
  });
}
function confirmOk() {
  document.getElementById("confirm-backdrop").classList.remove("open");
  if (_confirmResolve) { _confirmResolve(true); _confirmResolve = null; }
}
function confirmCancel() {
  document.getElementById("confirm-backdrop").classList.remove("open");
  if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
}
// Esc closes dialog
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && document.getElementById("confirm-backdrop").classList.contains("open")) confirmCancel();
  if (e.key === "Enter" && document.getElementById("confirm-backdrop").classList.contains("open")) { e.preventDefault(); confirmOk(); }
});

  if (!mime) return ICON.file;

  if (mime.startsWith("audio/")) return ICON.audio;
  if (mime.includes("pdf")) return ICON.pdf;

// Wire FILE drag-and-drop on every item row (for attachment upload).
// Idempotent — re-attaches after each render. Only triggers for file drags
// (checked via dataTransfer.types) so it doesn't interfere with row-reorder drag.
function wireDragDrop() {
  document.querySelectorAll(".item[data-item-id]").forEach(el => {
    if (el.__ddWired) return;
    el.__ddWired = true;
    const isFileDrag = (e) => {
      const types = e.dataTransfer && e.dataTransfer.types;
      if (!types) return false;
      // Files appear as "Files" in the types list
      return Array.from(types).includes("Files");
    };
    el.addEventListener("dragover", (e) => {
      if (!isFileDrag(e)) return; // let row-reorder handlers manage this
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
      el.classList.add("is-dragover");
    });
    el.addEventListener("dragleave", (e) => {
      if (!isFileDrag(e)) return;
      el.classList.remove("is-dragover");
    });
    el.addEventListener("drop", (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault();
      el.classList.remove("is-dragover");
      const itemId = el.getAttribute("data-item-id");
      if (e.dataTransfer.files && e.dataTransfer.files.length) {
        uploadAttachments(itemId, e.dataTransfer.files);
      }
    });
  });
}

// === Reorder within version group ===
async function reorderItem(id, direction) {
  const it = findItem(id);
  if (!it) return;
  // Get all items in same project + version, sorted by current order
  const siblings = (projects[it.project] || [])
    .filter(x => x.version === it.version)
    .sort((a,b) => (a.sort_order||0) - (b.sort_order||0) || new Date(a.created_at) - new Date(b.created_at));
  const idx = siblings.findIndex(x => x.id === id);
  const newIdx = direction === "up" ? idx - 1 : idx + 1;
  if (newIdx < 0 || newIdx >= siblings.length) return;
  const swap = siblings[newIdx];
  // Swap sort_order values
  const aOrder = it.sort_order ?? idx;
  const bOrder = swap.sort_order ?? newIdx;
  pendingFlash.add(it.id);
  pendingFlash.add(swap.id);
  await Promise.all([
    apiFetch("/api/dev-tracker/items/" + it.id, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ sort_order: bOrder }) }),
    apiFetch("/api/dev-tracker/items/" + swap.id, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ sort_order: aOrder }) }),
  ]);
  load();
}

// === Drag-and-drop reordering (HTML5 native) ===
// Drop within the same project+version → reorders by recomputing sort_order.
// Drop into a different version's body → also moves item to that version (smart).
let _dragSrcId = null;
function onItemDragStart(e) {
  const row = e.target.closest(".item");
  if (!row) return;
  _dragSrcId = row.dataset.itemId;
  row.classList.add("dragging");
  try { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", _dragSrcId); } catch (_) {}
}
function onItemDragEnd(e) {
  document.querySelectorAll(".item.dragging, .item.drag-over-top, .item.drag-over-bottom").forEach(el => {
    el.classList.remove("dragging", "drag-over-top", "drag-over-bottom");
  });
  _dragSrcId = null;
}
function onItemDragOver(e) {
  if (!_dragSrcId) return;
  const row = e.target.closest(".item");
  if (!row || row.dataset.itemId === _dragSrcId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  // Decide top vs bottom based on cursor Y
  const rect = row.getBoundingClientRect();
  const isTop = (e.clientY - rect.top) < rect.height / 2;
  // Clear all hint classes first to keep it tidy
  document.querySelectorAll(".item.drag-over-top, .item.drag-over-bottom").forEach(el => {
    if (el !== row) el.classList.remove("drag-over-top", "drag-over-bottom");
  });
  row.classList.toggle("drag-over-top", isTop);
  row.classList.toggle("drag-over-bottom", !isTop);
}
async function onItemDrop(e) {
  if (!_dragSrcId) return;
  const row = e.target.closest(".item");
  if (!row || row.dataset.itemId === _dragSrcId) return;
  e.preventDefault();
  const targetId = row.dataset.itemId;
  const isTop = row.classList.contains("drag-over-top");
  const targetVersion = row.dataset.version;
  const targetProject = row.dataset.project;
  // Reset hint classes immediately
  document.querySelectorAll(".item.drag-over-top, .item.drag-over-bottom, .item.dragging").forEach(el => {
    el.classList.remove("drag-over-top", "drag-over-bottom", "dragging");
  });
  await dropReorder(_dragSrcId, targetId, isTop, targetProject, targetVersion);
  _dragSrcId = null;
}
async function dropReorder(srcId, targetId, insertBefore, targetProject, targetVersion) {
  const src = findItem(srcId);
  const target = findItem(targetId);
  if (!src || !target) return;
  // Compute the new sort_order list for the destination bucket (same project+version as target).
  const destBucket = (projects[targetProject] || [])
    .filter(x => x.version === targetVersion && x.id !== srcId)
    .sort((a,b) => (a.sort_order || 0) - (b.sort_order || 0) || new Date(a.created_at) - new Date(b.created_at));
  const targetIdx = destBucket.findIndex(x => x.id === targetId);
  const insertIdx = insertBefore ? targetIdx : targetIdx + 1;
  destBucket.splice(insertIdx, 0, src);
  // Renumber sort_order at 10-step intervals so future inserts have room
  const patches = destBucket.map((it, i) => {
    const newOrder = (i + 1) * 10;
    if (it.sort_order === newOrder && (it.id !== srcId || it.version === targetVersion)) return null;
    const body = { sort_order: newOrder };
    if (it.id === srcId && (it.version !== targetVersion || it.project !== targetProject)) {
      body.version = targetVersion;
      // Note: project change via drag is intentionally NOT supported (drag stays within a deal)
    }
    return apiFetch("/api/dev-tracker/items/" + it.id, {
      method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body),
    });
  }).filter(Boolean);
  pendingFlash.add(srcId);
  if (patches.length) await Promise.all(patches);
  load(true);
}

async function changeItemVersion(id, original, value, el) {
  // Strip leading "v" or "V" the user may type, normalize whitespace
  const next = (value || "").replace(/^v/i, "").trim();
  if (!next) {
    el.textContent = "v" + original;
    return;
  }
  if (next === original) {
    // Just normalize display (in case they typed "v2.5" → keep as "v2.5")
    el.textContent = "v" + original;

  pendingFlash.add(id);

      method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ version: next }),
    });
    if (!r.ok) throw new Error("PATCH failed");
    load(true);
  } catch (e) {
    alert("Couldn't move item to v" + next + ": " + e.message);
    el.textContent = "v" + original;
  }
}

// === Rename a whole release (header click) — patches every item in the group ===
async function renameRelease(project, original, newValue, el) {
  const next = (newValue || "").replace(/^v/i, "").trim();
  if (!next || next === original) {
    el.textContent = "v" + original;
    return;
  }
  const items = (projects[project] || []).filter(x => x.version === original);
  if (!items.length) { el.textContent = "v" + original; return; }
  const ok = await confirmDialog({
    title: "Rename release?",
    message: `Move ${items.length} item${items.length===1?'':'s'} from v${original} to v${next}.`,
    target: project,
    okLabel: `Rename to v${next}`,
    okIsDanger: false,
  });
  if (!ok) { el.textContent = "v" + original; return; }
  items.forEach(it => pendingFlash.add(it.id));
  try {
    await Promise.all(items.map(it =>
      apiFetch("/api/dev-tracker/items/" + it.id, {
        method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ version: next }),
      })
    ));
    load(true);
  } catch (e) {
    alert("Rename failed: " + e.message);
    el.textContent = "v" + original;
  }
}

function calcStats(items) {
  const s = { total: items.length, open: 0, in_flight: 0, shipped: 0, tested_pass: 0, tested_fail: 0, wont_do: 0 };
  for (const i of items) if (i.status in s) s[i.status]++;
  s.completed = s.tested_pass + s.wont_do;
  s.pct = s.total ? Math.round((s.completed / s.total) * 100) : 0;
  return s;
}

function render() {
  const all = Object.values(projects).flat();
  const g = calcStats(all);

  // Global progress bar
  // Inline tiny progress in the masthead instead of a big widget
  const mp = document.getElementById("masthead-progress");
  if (mp) mp.textContent = `${g.completed} / ${g.total} done · ${g.pct}%`;

  // Filter banner is updated AFTER matchesFilters is defined — see updateFilterBanner() below.

  // Brief stats — clickable as status filters
  const deliveredCount = all.filter(i => i.status==="shipped" && i.charged).length;
  const skippedCount = all.filter(i => i.status==="wont_do").length;
  const briefCells = [
    ["b-total","total",g.total,true,"all"],
    ["b-open","not started",g.open,g.open>0,"open"],
    ["b-flight","building",g.in_flight,g.in_flight>0,"in_flight"],
    ["b-shipped","shipped",g.shipped,g.shipped>0,"shipped"],
    ["b-delivered","delivered",deliveredCount,deliveredCount>0,"delivered"],
    ["b-pass","passing",g.tested_pass,g.tested_pass>0,"tested_pass"],
    ["b-fail","failing",g.tested_fail,g.tested_fail>0,"tested_fail"],
    ["b-skipped","skipped",g.wont_do,skippedCount>0,"wont_do"],
  ];
  document.getElementById("brief").innerHTML = briefCells.map(([cls,label,n,hasValue,statusVal]) => `
    <div class="brief-cell ${cls} ${hasValue?'has-value':'zero'} ${filters.status===statusVal?'is-active':''}" onclick="setFilter('status','${statusVal}')" title="Filter: ${label}">
      <div class="brief-num">${n}</div>
      <div class="brief-label">${label}</div>
    </div>
  `).join("");

  // Build filter rows with dynamic counts
  const allVersions = [...new Set(all.map(i => i.version))].sort((a,b) => b.localeCompare(a, undefined, {numeric: true}));
  const allCategories = [...new Set(all.map(i => i.category || "feature"))].sort();
  const allDeals = Object.keys(projects).sort();
  const countBy = (pred) => all.filter(pred).length;

  const versionOpts = [["all", "All versions", all.length]].concat(
    allVersions.map(v => [v, "v"+v, countBy(i => i.version===v)])
  );
  const catOpts = [["all", "All categories", all.length]].concat(
    allCategories.map(c => [c, c.charAt(0).toUpperCase()+c.slice(1), countBy(i => (i.category||"feature")===c)])
  );
  const dealOpts = [["all", "All deals", all.length]].concat(
    allDeals.map(d => [d, d, countBy(i => i.project===d)])
  );

  const renderSelect = (key, opts) => {
    const isActive = filters[key] !== "all";
    return `<select class="filter-select ${isActive?'is-active':''}" onchange="setFilter('${key}', this.value)">
      ${opts.map(([val, lbl, n]) => `<option value="${val}" ${filters[key]===val?'selected':''}>${lbl} (${n})</option>`).join("")}
    </select>`;
  };

  // Density segmented + Group By select
  const densitySeg = `
    <div class="density-seg" role="tablist" aria-label="Density">
      <button class="${filters.density==='line'?'is-active':''}" onclick="setFilter('density','line')" title="Line — single-row scan view"><span class="seg-icon">≡</span> Line</button>
      <button class="${filters.density==='card'?'is-active':''}" onclick="setFilter('density','card')" title="Card — full detail per row"><span class="seg-icon">▦</span> Card</button>
      <button class="${filters.density==='open'?'is-active':''}" onclick="setFilter('density','open')" title="Open — every row's drawer pre-expanded"><span class="seg-icon">▤</span> Open</button>
    </div>`;
  const groupByOpts = [
    ["project", "Group: Project"],
    ["version", "Group: Release"],
    ["status", "Group: Status"],
    ["assignee", "Group: Assignee"],
    ["category", "Group: Category"],
    ["lifecycle", "Group: Lifecycle"],
    ["month", "Group: Month"],
    ["none", "No grouping"],
  ];
  const groupBySelect = `<select class="filter-select ${filters.groupBy!=='project'?'is-active':''}" onchange="setFilter('groupBy', this.value)" title="Group items by…">
    ${groupByOpts.map(([v, lbl]) => `<option value="${v}" ${filters.groupBy===v?'selected':''}>${lbl}</option>`).join("")}
  </select>`;

  document.getElementById("filter-rows").innerHTML = [
    densitySeg,
    groupBySelect,
    renderSelect("version", versionOpts),
    allDeals.length > 1 ? renderSelect("deal", dealOpts) : "",
    allCategories.length > 1 ? renderSelect("category", catOpts) : "",
  ].filter(Boolean).join("");

  // Toggle Reset visibility when any filter is active
  const anyActive = filters.status !== "all" || filters.version !== "all" || filters.deal !== "all" || filters.category !== "all" || (filters.search || "").trim() !== "" || filters.groupBy !== "project" || filters.density !== "line";
  document.getElementById("filter-reset").classList.toggle("visible", anyActive);

  // Apply filters
  const q = (filters.search || "").trim().toLowerCase();
  const matchesFilters = (it) => {
    if (filters.deal !== "all" && it.project !== filters.deal) return false;
    if (filters.version !== "all" && it.version !== filters.version) return false;
    if (filters.category !== "all" && (it.category || "feature") !== filters.category) return false;
    if (filters.status === "delivered") {
      if (!(it.status === "shipped" && it.charged)) return false;
    } else if (filters.status !== "all" && it.status !== filters.status) return false;
    if (q) {
      const hay = [it.title, it.source, it.commit_hash, ...(it.notes||[]).map(n=>n.text)].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  };

  // Update bulk bar
  updateBulkBar();

  const filteredAll = all.filter(matchesFilters);

  // Dispatch by groupBy. "project" keeps the current colored deal headers + version sub-grouping.
  // Everything else uses neutral group headers.
  let html = "";
  if (filteredAll.length === 0) {
    html = `<div class="empty"><div class="empty-mark">∅</div>No items match this filter.</div>`;
  } else if (filters.groupBy === "project") {
    const dealNames = Object.keys(projects).sort((a,b) => {
      const sa = calcStats(projects[a]), sb = calcStats(projects[b]);
      return (sb.open + sb.in_flight) - (sa.open + sa.in_flight);
    });
    const filteredDeals = dealNames.map(name => [name, projects[name].filter(matchesFilters)]).filter(([_, items]) => items.length > 0);
    html = filteredDeals.map(([name, items]) => renderDeal(name, items)).join("");
  } else {
    // Build buckets keyed by the chosen dimension
    const buckets = bucketByDimension(filteredAll, filters.groupBy);
    const orderedKeys = sortGroupKeys(buckets, filters.groupBy);
    html = orderedKeys.map(key => renderGenericGroup(key, buckets.get(key), filters.groupBy)).join("");
  }
  document.getElementById("deals").innerHTML = html;
  const invHost = document.getElementById("invoices-host");
  if (invHost) invHost.innerHTML = renderInvoicesSection();

  // === Filter banner (now matchesFilters is in scope) ===
  const fbEl = document.getElementById("filter-banner");
  const fbText = document.getElementById("filter-banner-text");
  if (fbEl && fbText) {
    const activeBits = [];
    if (filters.status !== "all") activeBits.push(`<span class="fb-key">${escapeHtml(filters.status)}</span>`);
    if (filters.version !== "all") activeBits.push(`<span class="fb-key">v${escapeHtml(filters.version)}</span>`);
    if (filters.deal !== "all") activeBits.push(`<span class="fb-key">${escapeHtml(filters.deal)}</span>`);
    if (filters.category !== "all") activeBits.push(`<span class="fb-key">${escapeHtml(filters.category)}</span>`);
    if ((filters.search || "").trim()) activeBits.push(`<span class="fb-key">"${escapeHtml(filters.search.trim())}"</span>`);
    if (activeBits.length > 0) {
      const visibleCount = filteredAll.length;
      fbText.innerHTML = `<span class="fb-prefix">Showing</span> ${visibleCount} of ${all.length} <span class="fb-prefix">·</span> ${activeBits.join(" ")}`;
      fbEl.classList.add("visible");
    } else {
      fbEl.classList.remove("visible");
    }
  }

  // Show/update the "Invoices →" jump button in the header
  const jumpBtn = document.getElementById("invoices-jump");
  const jumpLabel = document.getElementById("invoices-jump-label");
  if (jumpBtn && jumpLabel && invoices && invoices.length) {
    const paid = invoices.filter(i => i.status === "paid").reduce((s,i)=>s+i.total_cents, 0);
    const sent = invoices.filter(i => i.status === "sent").reduce((s,i)=>s+i.total_cents, 0);
    jumpBtn.style.display = "inline-block";
    jumpLabel.textContent = `Invoices · ${invoices.length}` + (sent > 0 ? ` · ${fmtMoney(sent)} unpaid` : ` · ${fmtMoney(paid)} paid`);
  }

  // Re-wire drag-drop on item rows (newly rendered)
  wireDragDrop();
}

// === Bucketing & generic group rendering (for dynamic group-by) ===
function lifecycleStage(it) {
  if (it.paid_at) return "paid";
  if (it.invoiced_at) return "invoiced";
  if (it.deployed_at || it.status === "shipped" || it.status === "tested_pass") return "shipped";
  if (it.delivered_at) return "delivered";
  if (it.status === "in_flight") return "building";
  if (it.status === "wont_do") return "skipped";
  return "open";
}
function bucketByDimension(items, dim) {
  const map = new Map();
  for (const it of items) {
    let key;
    switch (dim) {
      case "version":   key = it.version || "?"; break;
      case "status":    key = it.status || "open"; break;
      case "assignee":  key = it.assignee || "(unassigned)"; break;
      case "category":  key = it.category || "feature"; break;
      case "lifecycle": key = lifecycleStage(it); break;
      case "month":     key = (it.source_date || it.created_at || "").slice(0, 7) || "?"; break;
      case "none":      key = "All items"; break;
      default:          key = it.project || "?";
    }
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(it);
  }
  return map;
}
function sortGroupKeys(buckets, dim) {
  const keys = [...buckets.keys()];
  if (dim === "status") {
    const order = ["in_flight", "open", "shipped", "tested_pass", "tested_fail", "wont_do"];
    return keys.sort((a,b) => (order.indexOf(a) - order.indexOf(b)) || a.localeCompare(b));
  }
  if (dim === "lifecycle") {
    const order = ["paid", "invoiced", "shipped", "delivered", "building", "open", "skipped"];
    return keys.sort((a,b) => (order.indexOf(a) - order.indexOf(b)) || a.localeCompare(b));
  }
  if (dim === "version") {
    return keys.sort((a,b) => b.localeCompare(a, undefined, { numeric: true }));
  }
  if (dim === "month") {
    return keys.sort((a,b) => b.localeCompare(a));
  }
  // assignee, category, none, fallback → alpha, but pull "(unassigned)" to the end
  return keys.sort((a,b) => {
    if (a === "(unassigned)") return 1;
    if (b === "(unassigned)") return -1;
    return a.localeCompare(b);
  });
}
function groupLabel(key, dim) {
  const STATUS_FRIENDLY = {
    open: "Not started", in_flight: "Building", shipped: "Shipped",
    tested_pass: "Passing", tested_fail: "Failing", wont_do: "Skipped",
  };
  if (dim === "status") return STATUS_FRIENDLY[key] || key;
  if (dim === "lifecycle") return key.charAt(0).toUpperCase() + key.slice(1);
  if (dim === "category") return key.charAt(0).toUpperCase() + key.slice(1);
  if (dim === "assignee") return key === "(unassigned)" ? "Unassigned" : "@" + key;
  if (dim === "version") return "Release v" + key;
  if (dim === "month") {
    const [y, m] = key.split("-");
    if (!y || !m) return key;
    const dt = new Date(parseInt(y), parseInt(m) - 1, 1);
    return dt.toLocaleString("en-US", { month: "long", year: "numeric" });
  }
  return key;
}
function groupColor(key, dim) {
  if (dim === "status") {
    return ({
      open: "#0a0a0a", in_flight: "var(--orange)", shipped: "var(--accent)",
      tested_pass: "var(--green)", tested_fail: "var(--hot)", wont_do: "var(--ink-4)",
    })[key] || "var(--ink)";
  }
  if (dim === "lifecycle") {
    return ({
      paid: "#b8860b", invoiced: "var(--orange)", shipped: "var(--accent)",
      delivered: "var(--green)", building: "var(--orange)", open: "var(--ink)", skipped: "var(--ink-4)",
    })[key] || "var(--ink)";
  }
  return "var(--ink)";
}
function renderGenericGroup(key, items, dim) {
  const stats = calcStats(items);
  const collapsedKey = `g:${dim}:${key}`;
  const isCollapsed = !!collapsed[collapsedKey];
  const showProgress = ["version", "assignee", "month", "none"].includes(dim);
  // Pre-fill context for "+ Add item" — derive sensible defaults from this group's bucket
  const ctx = {};
  if (dim === "version") ctx.version = key;
  if (dim === "assignee" && key !== "(unassigned)") ctx.assignee = key;
  // Use the most common project in this bucket for non-project groupings, so the new item lands somewhere sensible
  if (items.length) {
    const projCount = {};
    items.forEach(it => { projCount[it.project] = (projCount[it.project] || 0) + 1; });
    ctx.project = Object.entries(projCount).sort((a,b) => b[1] - a[1])[0][0];
    if (!ctx.version) ctx.version = items[0].version;
  }
  const ctxJSON = escapeAttr(JSON.stringify(ctx));
  return `
    <section class="group-section ${isCollapsed?'collapsed':''}" data-group-key="${escapeAttr(key)}">
      <div class="group-hd" onclick="toggleGroup('${escapeAttr(collapsedKey)}')">
        <span class="group-chev">▾</span>
        <span class="group-tag" style="--group-color:${groupColor(key, dim)}">${escapeHtml(items.length + '')}</span>
        <span class="group-name">${escapeHtml(groupLabel(key, dim))}</span>
        ${showProgress ? `<span class="group-count">${stats.completed}/${stats.total} · ${stats.pct}%</span>` : `<span class="group-count">${items.length} item${items.length===1?'':'s'}</span>`}
      </div>
      <div class="group-body">
        ${items.map(renderItem).join("")}
        <button class="add-row-btn" onclick='openAdd(${ctxJSON})' title="Add a new item to ${escapeAttr(groupLabel(key, dim))}">
          <span class="add-row-plus">+</span> Add item to ${escapeHtml(groupLabel(key, dim))}
        </button>
      </div>
    </section>
  `;
}
function toggleGroup(collapsedKey) {
  collapsed[collapsedKey] = !collapsed[collapsedKey];
  localStorage.setItem("qa-collapsed", JSON.stringify(collapsed));
  render();
}

function renderDeal(name, items) {
  const allItems = projects[name];
  const s = calcStats(allItems);
  const isCollapsed = collapsed[name];
  const dealLabel = name.split("-").map(w => w[0].toUpperCase() + w.slice(1)).join(" ");
  const color = dealColor(name);
  const styleVars = `--deal-color: ${color.c}; --deal-shadow: ${color.s};`;

  const byVersion = new Map();
  for (const it of items) {
    const arr = byVersion.get(it.version) || []; arr.push(it); byVersion.set(it.version, arr);
  }
  const versions = [...byVersion.keys()].sort((a,b) => b.localeCompare(a, undefined, { numeric: true }));

  return `
  <section class="deal ${isCollapsed ? 'collapsed' : ''}" style="${styleVars}">
    <div class="deal-hd" onclick="toggleDeal('${name}')">
      <span class="deal-chev">▾</span>
      <div style="flex:1; min-width:0;">
        <h2 class="deal-name">${dealLabel}</h2>
        <div class="progress-bar progress-deal"><div class="progress-fill" style="width: ${s.pct}%"></div></div>
      </div>
      <div class="deal-mini">
        <span><b>${s.completed}</b>/${s.total}</span>
        <span class="progress-pct">${s.pct}%</span>
      </div>
    </div>
    <div class="deal-body">
      ${versions.map(v => {
        const vs = calcStats(byVersion.get(v));
        const safeV = escapeAttr(v);
        return `
        <div class="vgroup" data-version="${safeV}" data-project="${escapeAttr(name)}">
          <div class="vgroup-hd">
            <span class="vgroup-label">
              Release
              <span class="vgroup-num"
                    contenteditable="true"
                    spellcheck="false"
                    data-original="${safeV}"
                    onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}if(event.key==='Escape'){this.textContent=this.dataset.original;this.blur();}"
                    onblur="renameRelease('${escapeAttr(name)}', this.dataset.original, this.textContent.trim(), this)"
                    title="Click to rename this release. Updates every item in this group.">v${escapeHtml(v)}</span>
            </span>
            <span class="vgroup-count">${vs.completed}/${vs.total}</span>
            <span class="progress-pct-version">${vs.pct}%</span>
          </div>
          <div class="progress-bar progress-version"><div class="progress-fill" style="width: ${vs.pct}%"></div></div>
          <div class="vgroup-body" data-version-body="${safeV}" data-project-body="${escapeAttr(name)}" style="margin-top:14px;">
            ${byVersion.get(v).map(renderItem).join("")}
            <button class="add-row-btn" onclick="openAdd({ project: '${escapeAttr(name)}', version: '${safeV}' })" title="Add a new item to ${escapeAttr(name)} v${safeV}">
              <span class="add-row-plus">+</span> Add item to v${escapeHtml(v)}
            </button>
          </div>
        </div>
        `;
      }).join("")}
    </div>
  </section>
  `;
}

function parseChecklist(it) {
  if (it.category !== 'checklist' || !it.description) return null;
  try {
    const parsed = JSON.parse(it.description);
    if (parsed && parsed.kind === 'checklist' && Array.isArray(parsed.items)) return parsed;
  } catch {}
  return null;
}

async function toggleChecklistItem(itemId, stepId) {
  const it = findItem(itemId);
  const cl = parseChecklist(it);
  if (!cl) return;
  const step = cl.items.find(s => s.id === stepId);
  if (!step) return;
  step.done = !step.done;
  // Optimistic local update
  it.description = JSON.stringify(cl);
  render();
  pendingFlash.add(itemId);
  await apiFetch("/api/dev-tracker/items/" + itemId, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ description: it.description }) });
  load();
}

function findItem(id) {
  for (const arr of Object.values(projects)) {
    for (const it of arr) if (it.id === id) return it;
  }
  return null;
}

function toggleChecklistCollapsed(itemId) {
  if (collapsed[`cl:${itemId}`]) delete collapsed[`cl:${itemId}`];
  else collapsed[`cl:${itemId}`] = true;
  localStorage.setItem("qa-collapsed", JSON.stringify(collapsed));
  render();
}

// Dispatch by current density. Line/Open use the compact line + drawer.
// Card preserves the original full-card markup verbatim.
function renderItem(it) {
  if (filters.density === "card") return renderItemFull(it);
  return renderItemLine(it);
}

// Compact one-line row + optional drawer beneath
function renderItemLine(it) {
  const notes = it.notes || [];
  const unresolved = notes.filter(n => !n.resolved_at).length;
  const isExpanded = filters.density === "open" || expandedRows.has(it.id);
  const flashClass = pendingFlash.has(it.id) ? 'flash' : '';
  pendingFlash.delete(it.id);
  const isDelivered = it.status === 'shipped' && it.charged;
  const isSelected = selected.has(it.id);
  const cyclesTo = STATUS_FLOW[it.status];
  const statusColor = it.status; // CSS .pill.s-${status} sets bg
  return `
  <div class="item line row-s-${it.status} ${flashClass} ${isDelivered?'is-delivered':''} ${isSelected?'is-selected':''} ${isExpanded?'is-expanded':''}"
       data-item-id="${it.id}"
       data-version="${escapeAttr(it.version)}"
       data-project="${escapeAttr(it.project)}"
       data-category="${escapeAttr(it.category || 'feature')}"
       draggable="true">
    <div class="item-row">
      ${bulkMode ? `<input type="checkbox" class="bulk-check" ${isSelected?'checked':''} onchange="toggleSelected('${it.id}')" />` : ""}
      <span class="drag-handle" title="Drag to reorder">⋮⋮</span>
      <button class="row-toggle ${isExpanded?'is-open':''}" onclick="toggleRow('${it.id}')" title="${isExpanded?'Collapse':'Expand'} details" aria-label="${isExpanded?'Collapse':'Expand'} row"><span class="row-chev">›</span></button>
      <button class="pill s-${it.status}" onclick="cycleStatus('${it.id}', '${it.status}', this)" title="${STATUS_LABEL[it.status]} → ${STATUS_LABEL[cyclesTo]}">
        <span class="dot"></span>${STATUS_LABEL[it.status]}
      </button>
      <div class="item-main">
        <div class="item-title" contenteditable="true" data-original="${escapeAttr(it.title)}"
             onblur="if(this.textContent.trim() && this.textContent.trim() !== this.dataset.original) patchItem('${it.id}', { title: this.textContent.trim() })"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${escapeHtml(it.title)}</div>
        <div class="item-meta">
          <span class="version-chip"
                contenteditable="true"
                spellcheck="false"
                data-original="${escapeAttr(it.version)}"
                onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}if(event.key==='Escape'){this.textContent=this.dataset.original;this.blur();}"
                onblur="changeItemVersion('${it.id}', this.dataset.original, this.textContent.trim(), this)"
                title="Click to change release">v${escapeHtml(it.version)}</span>
          <select class="assignee-select" onchange="patchItem('${it.id}', { assignee: this.value || null })" title="Assignee">
            <option value="">— unassigned —</option>
            ${devUsernames().map(u => `<option value="${u}" ${it.assignee===u?'selected':''}>@${u}</option>`).join("")}
          </select>
          <span class="meta-item notes-link ${unresolved > 0 ? 'has-unresolved' : ''}" onclick="toggleNotes('${it.id}')" title="Notes">
            ${ICON.message}<span class="ico-count">${notes.length || ''}</span>
          </span>
          <span class="meta-item attach-link ${(it.attachments || []).length > 0 ? 'has-files' : ''}" onclick="document.getElementById('att-input-${it.id}').click()" title="Attachments">
            ${ICON.paperclip}<span class="ico-count">${(it.attachments || []).length || ''}</span>
          </span>
          <input type="file" id="att-input-${it.id}" multiple style="display:none" onchange="handleAttachInput('${it.id}', this)" />
          ${it.bundle ? `<span class="meta-item bundle-pill" title="Invoice line-item bundle">${escapeHtml(it.bundle)}</span>` : ""}
          ${watchPillFor(it)}
          ${invoiceBadgeFor(it)}
        </div>
      </div>
      <div class="actions-always">
        ${renderLifecycle(it)}
      </div>
      <div class="item-actions">
        <button class="icon-btn danger" onclick="deleteItem('${it.id}')" title="Delete">×</button>
      </div>
    </div>
    ${isExpanded ? renderItemDrawer(it) : ""}
  </div>
  `;
}

// The "dig deeper" drawer — editorial expanded view
function renderItemDrawer(it) {
  const refType = (it.source_ref && it.source_ref.type) || null;
  const hasContext = !!(it.source_context && it.source_context.trim());
  const checklist = parseChecklist(it);
  const notes = it.notes || [];
  const atts = it.attachments || [];
  const isCheckl = it.category === 'checklist';

  // Compact lifecycle band — same data as the row pills, but with dates
  const stages = [
    { name: "Delivered", on: !!it.delivered_at, date: it.delivered_at, color: "var(--green)" },
    { name: "Shipped",   on: !!it.deployed_at || it.status === "shipped" || it.status === "tested_pass", date: it.deployed_at, color: "var(--accent)" },
    { name: "Invoiced",  on: !!it.invoiced_at, date: it.invoiced_at, color: "var(--orange)" },
    { name: "Paid",      on: !!it.paid_at,     date: it.paid_at,     color: "#b8860b" },
  ];

  // Build meta key:value pairs, only including non-empty fields
  const metaRows = [];
  if (it.source) metaRows.push(["Source", `<span class="ico">${refTypeIcon(refType)}</span>${escapeHtml(it.source)}`]);
  if (it.source_date) metaRows.push(["Source date", escapeHtml(it.source_date.slice(0, 10))]);
  if (it.commit_hash) metaRows.push(["Commit", `<span class="pillette">${escapeHtml(it.commit_hash.slice(0, 7))}</span>`]);
  if (it.invoice_number) metaRows.push(["Invoice", `<span class="pillette">${escapeHtml(it.invoice_number)}</span>`]);
  if (it.tested_at) metaRows.push(["Tested", new Date(it.tested_at).toLocaleDateString()]);
  metaRows.push(["Created", new Date(it.created_at).toLocaleDateString()]);
  if (it.updated_at) metaRows.push(["Updated", new Date(it.updated_at).toLocaleString()]);
  if (it.assignee) metaRows.push(["Assignee", `@${escapeHtml(it.assignee)}`]);
  metaRows.push(["Category", escapeHtml((it.category || "feature").replace(/^./, c => c.toUpperCase()))]);

  return `
    <div class="row-drawer">
      <div class="drawer-grid">

        ${!isCheckl ? `
          <div class="drawer-section full">
            <span class="drawer-label">Description</span>
            <div class="drawer-desc" contenteditable="true" spellcheck="true"
                 data-original="${escapeAttr(it.description || '')}"
                 onblur="const v=this.textContent;if(v!==this.dataset.original){patchItem('${it.id}', { description: v });this.dataset.original=v;}">${escapeHtml(it.description || '')}</div>
          </div>
        ` : ''}

        <div class="drawer-section full">
          <span class="drawer-label">Status</span>
          ${renderStatusPicker(it)}
        </div>

        <div class="drawer-section full">
          <span class="drawer-label">Lifecycle</span>
          <div class="drawer-lifecycle">
            ${stages.map((s, i) => `
              ${i > 0 ? `<span class="lc-arrow">›</span>` : ''}
              <div class="lc-stage">
                <span class="lc-step ${s.on ? 'lc-on' : ''}" style="${s.on ? `background:${s.color};border-color:${s.color};color:white;` : ''}">${s.name.charAt(0)}</span>
                <span class="lc-stage-name">${s.name}</span>
                <span class="lc-stage-date">${s.date ? fmtDateShort(s.date) : ''}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="drawer-section">
          <span class="drawer-label">Meta</span>
          <div class="drawer-meta">
            ${metaRows.map(([k, v]) => `
              <div class="drawer-meta-key">${k}</div>
              <div class="drawer-meta-val">${v}</div>
            `).join('')}
          </div>
        </div>

        <div class="drawer-section full">
          <span class="drawer-label">Video walkthrough</span>
          ${renderVideoSection(it)}
        </div>

        <div class="drawer-section right">
          <span class="drawer-label">Attachments <span class="lbl-count">${atts.length || ''}</span></span>
          ${atts.length ? renderAttachments(it) : `
            <div class="drawer-dropzone" onclick="document.getElementById('att-input-${it.id}').click()">
              <span class="dz-icon">${ICON.paperclip.replace('width="14" height="14"', 'width="22" height="22"')}</span>
              Drop files anywhere on this row,<br/>or click here to browse.
            </div>
          `}
        </div>

        ${checklist ? `
          <div class="drawer-section full">
            <span class="drawer-label">Checklist</span>
            ${renderChecklist(it, checklist)}
          </div>
        ` : ''}

        ${hasContext ? `
          <div class="drawer-section full">
            <span class="drawer-label">Source context ${refType ? `<span class="lbl-count">${escapeHtml(refType.replace('-', ' '))}</span>` : ''}</span>
            <pre class="drawer-context">${escapeHtml(it.source_context)}</pre>
          </div>
        ` : ''}

        <div class="drawer-section full">
          <span class="drawer-label">Notes <span class="lbl-count">${notes.length}</span></span>
          <div class="notes-section">
            ${notes.length === 0 ? '<div style="color:var(--ink-4); font-size:12.5px; font-style:italic; padding:4px 0;">No notes yet — add the first one below.</div>' : ''}
            ${notes.map(n => `
              <div class="note ${n.resolved_at ? 'resolved' : ''}">
                <span class="check-wrap"><input type="checkbox" ${n.resolved_at ? 'checked' : ''} onchange="toggleNoteResolved('${it.id}', '${n.id}', this.checked)" /></span>
                <div class="note-text">
                  ${escapeHtml(n.text)}
                  <div class="note-meta">${escapeHtml(n.author)} · ${new Date(n.created_at).toLocaleString()}${n.resolved_at ? ' · resolved by ' + escapeHtml(n.resolved_by || '') + ' ' + new Date(n.resolved_at).toLocaleDateString() : ''}</div>
                </div>
              </div>
            `).join("")}
            <div class="note-add">
              <div class="note-add-row">
                <input id="note-${it.id}" placeholder="Add a note…" onkeydown="if(event.key==='Enter') { const t=this.value; this.value=''; addNote('${it.id}', t); }" />
                <button class="note-add-btn" onclick="const i=document.getElementById('note-${it.id}'); const t=i.value; i.value=''; addNote('${it.id}', t);">Add</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  `;
}

function renderItemFull(it) {
  const notes = it.notes || [];
  const unresolved = notes.filter(n => !n.resolved_at).length;
  const showNotes = expandedNotes.has(it.id);
  const showContext = expandedContext.has(it.id);
  const hasContext = !!(it.source_context && it.source_context.trim());
  const refType = (it.source_ref && it.source_ref.type) || null;
  const cyclesTo = STATUS_FLOW[it.status];
  const flashClass = pendingFlash.has(it.id) ? 'flash' : '';
  pendingFlash.delete(it.id);
  const isDelivered = it.status === 'shipped' && it.charged;
  const checklist = parseChecklist(it);
  const isSelected = selected.has(it.id);
  return `
  <div class="item row-s-${it.status} ${flashClass} ${isDelivered ? 'is-delivered' : ''} ${isSelected ? 'is-selected' : ''}"
       data-item-id="${it.id}"
       data-version="${escapeAttr(it.version)}"
       data-project="${escapeAttr(it.project)}"
       draggable="true">
    <div class="item-row">
      ${bulkMode ? `<input type="checkbox" class="bulk-check" ${isSelected?'checked':''} onchange="toggleSelected('${it.id}')" />` : ""}
      <span class="drag-handle" title="Drag to reorder">⋮⋮</span>
      <div class="reorder-col">
        <button class="reorder-btn" onclick="reorderItem('${it.id}','up')" title="Move up">▲</button>
        <button class="reorder-btn" onclick="reorderItem('${it.id}','down')" title="Move down">▼</button>
      </div>
      <div class="item-pillstack">
        <button class="pill s-${it.status}" onclick="cycleStatus('${it.id}', '${it.status}', this)" title="Click → ${STATUS_LABEL[cyclesTo]}">
          <span class="dot"></span>${STATUS_LABEL[it.status]}
        </button>
        <span class="cat cat-${it.category}">${it.category}</span>
      </div>
      <div class="item-main">
        <div class="item-title" contenteditable="true" data-original="${escapeAttr(it.title)}" onblur="if(this.textContent.trim() && this.textContent.trim() !== this.dataset.original) patchItem('${it.id}', { title: this.textContent.trim() })">${escapeHtml(it.title)}</div>
        <div class="item-meta">
          <span class="version-chip"
                contenteditable="true"
                spellcheck="false"
                data-original="${escapeAttr(it.version)}"
                onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}if(event.key==='Escape'){this.textContent=this.dataset.original;this.blur();}"
                onblur="changeItemVersion('${it.id}', this.dataset.original, this.textContent.trim(), this)"
                title="Click to change which release this item belongs to">v${escapeHtml(it.version)}</span>
          ${isDelivered ? `<span class="delivered-badge"><span class="chk">✓</span>Delivered</span>` : ""}
          ${it.source ? `<span class="meta-item source-link ${hasContext ? 'has-context' : 'no-context'} ${showContext ? 'is-open' : ''}" onclick="${hasContext ? `toggleContext('${it.id}')` : ''}" title="${hasContext ? 'Click to view source context' : 'No context captured'}">${refTypeIcon(refType)} ${escapeHtml(it.source)}${hasContext ? (showContext ? ' ▾' : ' ▸') : ''}</span>` : ""}
          ${it.source_date ? `<span class="meta-item">${it.source_date.slice(0,10)}</span>` : ""}
          ${it.commit_hash ? `<span class="meta-item commit">${it.commit_hash.slice(0,7)}</span>` : ""}
          ${it.tested_at ? `<span class="meta-item">tested ${new Date(it.tested_at).toLocaleDateString()}</span>` : ""}
          <select class="assignee-select" onchange="patchItem('${it.id}', { assignee: this.value || null })" title="Assign to developer">
            <option value="">— unassigned —</option>
            ${devUsernames().map(u => `<option value="${u}" ${it.assignee===u?'selected':''}>@${u}</option>`).join("")}
          </select>
          <span class="meta-item notes-link ${unresolved > 0 ? 'has-unresolved' : ''}" onclick="toggleNotes('${it.id}')">
            ${notes.length === 0 ? "+ Add note" : (unresolved > 0 ? `${unresolved} unresolved · ${notes.length} total` : `${notes.length} note${notes.length===1?'':'s'}`)}
          </span>
          <span class="meta-item attach-link ${(it.attachments || []).length > 0 ? 'has-files' : ''}" onclick="document.getElementById('att-input-${it.id}').click()">
            ${ICON.paperclip}<span class="ico-count">${(it.attachments || []).length || 'Attach'}</span>
          </span>
          <input type="file" id="att-input-${it.id}" multiple style="display:none" onchange="handleAttachInput('${it.id}', this)" />
        </div>
      </div>
      <div class="actions-always">
        ${renderLifecycle(it)}
      </div>
      <div class="item-actions">
        <button class="icon-btn danger" onclick="deleteItem('${it.id}')" title="Delete">×</button>
      </div>
    </div>
    ${renderAttachments(it)}
    ${checklist ? renderChecklist(it, checklist) : ""}
    ${showContext && hasContext ? `
      <div class="context-panel">
        <div class="context-head">
          <span class="context-head-label">${refTypeIcon(refType)} Source Context${refType ? ' · ' + refType.replace('-', ' ') : ''}</span>
          ${it.source_ref ? `<span class="context-head-ref">${escapeHtml(JSON.stringify(it.source_ref))}</span>` : ""}
        </div>
        <pre class="context-body">${escapeHtml(it.source_context)}</pre>
      </div>
    ` : ""}
    ${showNotes ? `
      <div class="notes-section">
        ${notes.length === 0 ? '<div style="color:var(--ink-4); font-size:14px; font-style:italic;">No notes yet — add the first one below.</div>' : ''}
        ${notes.map(n => `
          <div class="note ${n.resolved_at ? 'resolved' : ''}">
            <span class="check-wrap"><input type="checkbox" ${n.resolved_at ? 'checked' : ''} onchange="toggleNoteResolved('${it.id}', '${n.id}', this.checked)" /></span>
            <div class="note-text">
              ${escapeHtml(n.text)}
              <div class="note-meta">${escapeHtml(n.author)} · ${new Date(n.created_at).toLocaleString()}${n.resolved_at ? ' · resolved by ' + escapeHtml(n.resolved_by || '') + ' ' + new Date(n.resolved_at).toLocaleDateString() : ''}</div>
            </div>
          </div>
        `).join("")}
        <div class="note-add">
          <div class="note-add-row">
            <input id="note-${it.id}" placeholder="Type a note and press Enter…" onkeydown="if(event.key==='Enter') { const t=this.value; this.value=''; addNote('${it.id}', t); }" />
            <button class="note-add-btn" onclick="const i=document.getElementById('note-${it.id}'); const t=i.value; i.value=''; addNote('${it.id}', t);">Add</button>
          </div>
        </div>
      </div>
    ` : ""}
  </div>
  `;
}

function renderChecklist(it, cl) {
  const key = `cl:${it.id}`;
  const isCollapsed = !!collapsed[key];
  const done = cl.items.filter(s => s.done).length;
  const total = cl.items.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const allDone = done === total && total > 0;
  return `
    <div class="checklist-wrap ${isCollapsed ? 'collapsed' : ''}">
      <div class="checklist-hdr" onclick="toggleChecklistCollapsed('${it.id}')">
        <span class="checklist-toggle"><span class="chev">▾</span>Testing checklist · ${done}/${total} done</span>
        <span class="checklist-progress ${allDone ? 'done' : ''}">${pct}%</span>
      </div>
      <div class="checklist-bar"><div class="checklist-bar-fill" style="width:${pct}%"></div></div>
      <div class="checklist-body">
        ${cl.items.map(step => `
          <div class="checklist-row ${step.done ? 'done' : ''}">
            <input type="checkbox" id="chk-${it.id}-${step.id}" ${step.done ? 'checked' : ''} onchange="toggleChecklistItem('${it.id}', '${step.id}')" />
            <label for="chk-${it.id}-${step.id}">${escapeHtml(step.label)}</label>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function escapeHtml(s) { return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, "&#96;"); }

// openAdd can be called bare (defaults from last item) or with a context
// like { project: "mitchs-map", version: "2.5" } to pre-fill the modal.
function openAdd(ctx) {
  const titleEl = document.getElementById("m-title");
  const projEl  = document.getElementById("m-project");
  const verEl   = document.getElementById("m-version");
  if (titleEl) titleEl.value = "";
  if (ctx && typeof ctx === "object") {
    if (ctx.project && projEl) projEl.value = ctx.project;
    if (ctx.version && verEl)  verEl.value  = ctx.version;
  }
  document.getElementById("add-modal").style.display = "flex";
  setTimeout(() => titleEl && titleEl.focus(), 50);
}
function closeAdd() { document.getElementById("add-modal").style.display = "none"; document.getElementById("m-title").value = ""; }
async function createItem() {
  const body = {
    project: (document.getElementById("m-project").value || "mitchs-map").trim().toLowerCase().replace(/\s+/g, '-'),
    title: document.getElementById("m-title").value.trim(),
    version: document.getElementById("m-version").value.trim() || "2.4",
    category: document.getElementById("m-category").value,
    source: document.getElementById("m-source").value,
    source_date: new Date().toISOString().slice(0,10),
  };
  if (!body.title) return;
  const r = await apiFetch("/api/dev-tracker/items", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
  const created = await r.json();
  if (created && created.id) pendingFlash.add(created.id);
  closeAdd();
  load();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeAdd();
  if (e.key === "n" && !e.target.matches("input,textarea,[contenteditable]") && document.getElementById("add-modal").style.display === "none") {
    e.preventDefault(); openAdd();
  }
});

// Smart polling: pause when tab hidden, skip when user is typing in an input/textarea.
let _pollTimer = null;
function startPolling() {
  if (_pollTimer) return;
  _pollTimer = setInterval(() => {
    if (document.hidden) return; // tab not visible — skip
    const ae = document.activeElement;
    if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable)) return; // user is typing — skip
    load();
  }, 30000);
}
function stopPolling() { if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; } }
document.addEventListener("visibilitychange", () => {
  if (document.hidden) { stopPolling(); }
  else { load(); startPolling(); } // refresh + resume immediately when tab returns
});
// Delegated drag-and-drop on the items container — survives every re-render
function bindDragDelegation() {
  const root = document.getElementById("deals");
  if (!root || root.__dragBound) return;
  root.__dragBound = true;
  root.addEventListener("dragstart", onItemDragStart);
  root.addEventListener("dragend", onItemDragEnd);
  root.addEventListener("dragover", onItemDragOver);
  root.addEventListener("drop", onItemDrop);
  // Also bind dragleave to clear stale hint classes
  root.addEventListener("dragleave", (e) => {
    const row = e.target.closest(".item");
    if (row && !row.contains(e.relatedTarget)) {
      row.classList.remove("drag-over-top", "drag-over-bottom");
    }
  });
  bindTouchDrag(root);
}

// === Touch drag — long-press a row to start, drag with finger, release to drop.
// Uses Pointer Events so it works on iOS/Android where HTML5 native drag is broken. ===
function bindTouchDrag(root) {
  if (!matchMedia('(pointer: coarse)').matches) return;
  let srcRow = null;
  let holdTimer = null;
  let dragging = false;
  let startX = 0, startY = 0;
  let lastTargetRow = null;

  function clearHints() {
    document.querySelectorAll(".item.drag-over-top, .item.drag-over-bottom, .item.dragging")
      .forEach(el => el.classList.remove("drag-over-top", "drag-over-bottom", "dragging"));
  }

  root.addEventListener("pointerdown", (e) => {
    if (e.pointerType !== "touch") return;
    if (e.target.closest("input, select, button, textarea, [contenteditable], a, .att-thumb")) return;
    const row = e.target.closest(".item");
    if (!row) return;
    srcRow = row;
    startX = e.clientX; startY = e.clientY;
    holdTimer = setTimeout(() => {
      if (!srcRow) return;
      dragging = true;
      srcRow.classList.add("dragging");
      try { navigator.vibrate?.(15); } catch (_) {}
      // Capture pointer so subsequent moves come to root
      try { root.setPointerCapture(e.pointerId); } catch (_) {}
    }, 380);
  });

  root.addEventListener("pointermove", (e) => {
    if (!srcRow) return;
    if (!dragging) {
      // Cancel long-press if user starts scrolling
      if (Math.abs(e.clientY - startY) > 8 || Math.abs(e.clientX - startX) > 8) {
        clearTimeout(holdTimer); srcRow = null; dragging = false;
      }
      return;
    }
    e.preventDefault(); // suppress page scroll while dragging
    // Find the row under the pointer
    const els = document.elementsFromPoint(e.clientX, e.clientY);
    const overRow = els.find(el => el.classList && el.classList.contains("item") && el !== srcRow);
    if (!overRow) return;
    if (lastTargetRow && lastTargetRow !== overRow) {
      lastTargetRow.classList.remove("drag-over-top", "drag-over-bottom");
    }
    lastTargetRow = overRow;
    const rect = overRow.getBoundingClientRect();
    const isTop = (e.clientY - rect.top) < rect.height / 2;
    overRow.classList.toggle("drag-over-top", isTop);
    overRow.classList.toggle("drag-over-bottom", !isTop);
  }, { passive: false });

  root.addEventListener("pointerup", async (e) => {
    clearTimeout(holdTimer);
    if (!dragging || !srcRow) { srcRow = null; dragging = false; clearHints(); return; }
    const target = lastTargetRow;
    if (target && target !== srcRow) {
      const isTop = target.classList.contains("drag-over-top");
      const targetVersion = target.dataset.version;
      const targetProject = target.dataset.project;
      clearHints();
      try { navigator.vibrate?.(8); } catch (_) {}
      await dropReorder(srcRow.dataset.itemId, target.dataset.itemId, isTop, targetProject, targetVersion);
    } else {
      clearHints();
    }
    srcRow = null; dragging = false; lastTargetRow = null;
  });

  root.addEventListener("pointercancel", () => {
    clearTimeout(holdTimer);
    srcRow = null; dragging = false; lastTargetRow = null;
    clearHints();
  });
}

loadCurrentUser().then(() => { load(true); startPolling(); bindDragDelegation(); });
</script>
</body>
</html>
