  const statusColor = it.status; // CSS .pill.s-${status} sets bg
  return `
  <div class="item line row-s-${it.status} ${flashClass} ${isDelivered?'is-delivered':''} ${isSelected?'is-selected':''} ${isExpanded?'is-expanded':''}"
       data-item-id="${it.id}"
       data-version="${escapeAttr(it.version)}"
       data-project="${escapeAttr(it.project)}"
       data-category="${escapeAttr(it.category || 'feature')}"
       draggable="true">
    <div class="item-row">
      ${bulkMode ? `<input type="checkbox" class="bulk-check" ${isSelected?'checked':''} onchange="toggleSelected('${it.id}')" />` : ""}
      <span class="row-num" aria-hidden="true"></span>
      <span class="drag-handle" title="Drag to reorder">⋮⋮</span>
      <button class="row-toggle ${isExpanded?'is-open':''}" onclick="toggleRow('${it.id}')" title="${isExpanded?'Collapse':'Expand'} details" aria-label="${isExpanded?'Collapse':'Expand'} row"><span class="row-chev">›</span></button>
      <button class="pill s-${it.status}" onclick="cycleStatus('${it.id}', '${it.status}', this)" title="${STATUS_LABEL[it.status]} → ${STATUS_LABEL[cyclesTo]}">
        <span class="dot"></span>${STATUS_LABEL[it.status]}
      </button>
      <div class="item-main">
        <div class="item-title" contenteditable="true" data-original="${escapeAttr(it.title)}"
             onblur="if(this.textContent.trim() && this.textContent.trim() !== this.dataset.original) patchItem('${it.id}', { title: this.textContent.trim() })"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${escapeHtml(it.title)}</div>
        <span class="col-resizer" data-col="title" title="Drag to resize title column"></span>
        <div class="item-meta">
          ${it.seq_num != null ? `<span class="item-id-chip" title="Item ID — click to copy" onclick="event.stopPropagation();navigator.clipboard.writeText('#${it.seq_num}').catch(()=>{});">#${it.seq_num}</span>` : ''}
          <span class="version-chip"
                contenteditable="true"
                spellcheck="false"
                data-original="${escapeAttr(it.version)}"
                onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}if(event.key==='Escape'){this.textContent=this.dataset.original;this.blur();}"
                onblur="changeItemVersion('${it.id}', this.dataset.original, this.textContent.trim(), this)"
                title="Click to change release">v${escapeHtml(it.version)}</span>
          ${renderAssigneeDd(it)}
          <span class="meta-item notes-link ${unresolved > 0 ? 'has-unresolved' : ''}" onclick="toggleNotes('${it.id}')" title="Notes">
            ${ICON.message}<span class="ico-count">${notes.length || ''}</span>
          </span>
          <span class="meta-item attach-link ${(it.attachments || []).length > 0 ? 'has-files' : ''}" onclick="document.getElementById('att-input-${it.id}').click()" title="Attachments">
            ${ICON.paperclip}<span class="ico-count">${(it.attachments || []).length || ''}</span>
          </span>
          <input type="file" id="att-input-${it.id}" multiple accept="*/*" style="display:none" onchange="handleAttachInput('${it.id}', this)" />
          ${(() => { const c = formatCreatedDate(it.created_at); return c.short ? `<span class="meta-item created-date" title="${escapeAttr(c.full)}">${escapeHtml(c.short)}</span>` : ""; })()}
          ${it.developed_by_ai ? `<span class="meta-item ai-badge" title="Developed by AI — branch is local-only, awaiting human review/push">AI</span>` : ""}
          ${it.bundle ? `<span class="meta-item bundle-pill" title="Invoice line-item bundle">${escapeHtml(it.bundle)}</span>` : ""}
          ${watchPillFor(it)}
          ${invoiceBadgeFor(it)}
        </div>
      </div>
      <div class="actions-always">
        ${renderCatChip(it)}
      </div>
      <div class="item-actions">
        <button class="icon-btn danger" onclick="deleteItem('${it.id}')" title="Delete">×</button>
      </div>
    </div>
    ${isExpanded ? renderItemDrawer(it) : ""}
  </div>
  `;
}

// The "dig deeper" drawer — editorial expanded view
function renderItemDrawer(it) {
  const refType = (it.source_ref && it.source_ref.type) || null;
  const hasContext = !!(it.source_context && it.source_context.trim());
  const checklist = parseChecklist(it);
  const notes = it.notes || [];
  const atts = it.attachments || [];
  const isCheckl = it.category === 'checklist';

  // Build meta key:value pairs, only including non-empty fields
  const metaRows = [];
  if (it.source) metaRows.push(["Source", `<span class="ico">${refTypeIcon(refType)}</span>${escapeHtml(it.source)}`]);
  if (it.source_date) metaRows.push(["Source date", escapeHtml(it.source_date.slice(0, 10))]);
  if (it.commit_hash) metaRows.push(["Commit", `<span class="pillette">${escapeHtml(it.commit_hash.slice(0, 7))}</span>`]);
  if (it.invoice_number) metaRows.push(["Invoice", `<span class="pillette">${escapeHtml(it.invoice_number)}</span>`]);
  if (it.shipped_at) metaRows.push(["Shipped", new Date(it.shipped_at).toLocaleString()]);
  if (it.time_estimate_hours != null) metaRows.push(["Est. time", `<span class="pillette">${it.time_estimate_hours}h</span>`]);
  if (it.tested_at) metaRows.push(["Tested", new Date(it.tested_at).toLocaleDateString()]);
  metaRows.push(["Created", new Date(it.created_at).toLocaleDateString()]);
  if (it.updated_at) metaRows.push(["Updated", new Date(it.updated_at).toLocaleString()]);
  if (it.assignee) metaRows.push(["Assignee", `@${escapeHtml(it.assignee)}`]);
  // category shown in dedicated Type picker above

  return `
    <div class="row-drawer">
      <div class="drawer-grid">

        ${!isCheckl ? `
          <div class="drawer-section full">
            <span class="drawer-label">Description</span>
            <div class="drawer-desc" contenteditable="true" spellcheck="true"
                 data-original="${escapeAttr(it.description || '')}"
                 onblur="const v=this.textContent;if(v!==this.dataset.original){patchItem('${it.id}', { description: v });this.dataset.original=v;}">${escapeHtml(it.description || '')}</div>
          </div>
        ` : ''}

        <div class="drawer-section half">
          <span class="drawer-label">Status</span>
          <select class="drawer-select" onchange="setItemStatus('${it.id}', this.value)">
            <option value="not_started" ${it.status==='not_started' ?'selected':''}>Not started</option>
            <option value="in_progress" ${it.status==='in_progress' ?'selected':''}>In-progress</option>
            <option value="completed"   ${it.status==='completed'   ?'selected':''}>Completed</option>
            <option value="failing"     ${it.status==='failing'     ?'selected':''}>Failing</option>
            <option value="on_hold"     ${it.status==='on_hold'     ?'selected':''}>On-hold</option>
          </select>
        </div>

        <div class="drawer-section half">
          <span class="drawer-label">Type</span>
          <select class="drawer-select" onchange="patchItem('${it.id}', { category: this.value }); render();">
            ${CAT_LIST.map(c => `<option value="${c.value}" ${(it.category||'feature')===c.value?'selected':''}>${c.label}</option>`).join('')}
          </select>
        </div>

        <div class="drawer-section half">
          <span class="drawer-label">Developed by AI</span>
          <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
            <input type="checkbox" ${it.developed_by_ai ? 'checked' : ''}
                   onchange="patchItem('${it.id}', { developed_by_ai: this.checked })" />
            <span>${it.developed_by_ai ? 'Yes — local branch awaiting review' : 'No (human-developed)'}</span>
          </label>
        </div>

        <div class="drawer-section">
          <span class="drawer-label">Meta</span>
          <div class="drawer-meta">
            ${metaRows.map(([k, v]) => `
              <div class="drawer-meta-key">${k}</div>
              <div class="drawer-meta-val">${v}</div>
            `).join('')}
          </div>
        </div>

        <div class="drawer-section full">
          <span class="drawer-label">Video walkthrough</span>
          ${renderVideoSection(it)}
        </div>

        <div class="drawer-section right">
          <span class="drawer-label">Attachments <span class="lbl-count">${atts.length || ''}</span></span>
          ${atts.length ? renderAttachments(it) : `
            <div class="drawer-dropzone" onclick="document.getElementById('att-input-${it.id}').click()">
              <span class="dz-icon">${ICON.paperclip.replace('width="14" height="14"', 'width="22" height="22"')}</span>
              Drop files anywhere on this row,<br/>or click here to browse.
            </div>
          `}
        </div>

        ${checklist ? `
          <div class="drawer-section full">
            <span class="drawer-label">Checklist</span>
            ${renderChecklist(it, checklist)}
          </div>
        ` : ''}

        ${hasContext ? `
          <div class="drawer-section full">
            <span class="drawer-label">Source context ${refType ? `<span class="lbl-count">${escapeHtml(refType.replace('-', ' '))}</span>` : ''}</span>
            <pre class="drawer-context">${linkifyEscaped(escapeHtml(it.source_context))}</pre>
          </div>
        ` : ''}

        <div class="drawer-section full">
          <span class="drawer-label">Notes <span class="lbl-count">${notes.length}</span></span>
          <div class="notes-section">
            ${notes.length === 0 ? '<div style="color:var(--ink-4); font-size:12.5px; font-style:italic; padding:4px 0;">No notes yet — add the first one below.</div>' : ''}
            ${notes.map(n => `
              <div class="note ${n.resolved_at ? 'resolved' : ''}">
                <span class="check-wrap"><input type="checkbox" ${n.resolved_at ? 'checked' : ''} onchange="toggleNoteResolved('${it.id}', '${n.id}', this.checked)" /></span>
                <div class="note-text">
                  ${escapeHtml(n.text)}
                  <div class="note-meta">${escapeHtml(n.author)} · ${new Date(n.created_at).toLocaleString()}${n.resolved_at ? ' · resolved by ' + escapeHtml(n.resolved_by || '') + ' ' + new Date(n.resolved_at).toLocaleDateString() : ''}</div>
                </div>
              </div>
            `).join("")}
            <div class="note-add">
              <div class="note-add-row">
                <input id="note-${it.id}" placeholder="Add a note…" onkeydown="if(event.key==='Enter') { const t=this.value; this.value=''; addNote('${it.id}', t); }" />
                <button class="note-add-btn" onclick="const i=document.getElementById('note-${it.id}'); const t=i.value; i.value=''; addNote('${it.id}', t);">Add</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  `;
}

function renderChecklist(it, cl) {
  const key = `cl:${it.id}`;
  const isCollapsed = !!collapsed[key];
  const done = cl.items.filter(s => s.done).length;
  const total = cl.items.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const allDone = done === total && total > 0;
  return `
    <div class="checklist-wrap ${isCollapsed ? 'collapsed' : ''}">
      <div class="checklist-hdr" onclick="toggleChecklistCollapsed('${it.id}')">
        <span class="checklist-toggle"><span class="chev">▾</span>Testing checklist · ${done}/${total} done</span>
        <span class="checklist-progress ${allDone ? 'done' : ''}">${pct}%</span>
      </div>
      <div class="checklist-bar"><div class="checklist-bar-fill" style="width:${pct}%"></div></div>
      <div class="checklist-body">
        ${cl.items.map(step => `
          <div class="checklist-row ${step.done ? 'done' : ''}">
            <input type="checkbox" id="chk-${it.id}-${step.id}" ${step.done ? 'checked' : ''} onchange="toggleChecklistItem('${it.id}', '${step.id}')" />
            <label for="chk-${it.id}-${step.id}">${escapeHtml(step.label)}</label>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function formatCreatedDate(iso) {
  if (!iso) return { short: "", full: "" };
  const d = new Date(iso);
  if (isNaN(d)) return { short: "", full: "" };
  const now = new Date();
  const sameYear = d.getFullYear() === now.getFullYear();
  const month = d.toLocaleString(undefined, { month: "short" });
  const day = d.getDate();
  const time = d.toLocaleString(undefined, { hour: "numeric", minute: "2-digit" }).replace(/\s/g, "").toLowerCase();
  const datePart = sameYear ? `${month} ${day}` : `${month} ${day} '${String(d.getFullYear()).slice(-2)}`;
  const short = `${datePart} ${time}`;
  const full = `Created ${d.toLocaleString(undefined, { weekday: "short", month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" })}`;
  return { short, full };
}
function escapeHtml(s) { return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, "&#96;"); }
// Wraps bare http/https URLs inside already-escaped HTML in clickable <a> tags.
// Trailing chars that aren't part of the URL (HTML entities from escapeHtml, plus
// common punctuation) stay outside the link.
function linkifyEscaped(escaped) {
  return (escaped || "").replace(/(https?:\/\/[^\s<>"]+)/g, (m) => {
    let url = m, suffix = "";
    // Strip trailing escapeHtml entities first (e.g. <https://x.com> → matched URL ends in &gt;).
    const ent = url.match(/(?:&(?:amp|lt|gt|quot|#39);?)$/i);
    if (ent) { url = url.slice(0, -ent[0].length); suffix = ent[0] + suffix; }
    // Then strip trailing punctuation.
    const trail = url.match(/[.,;:!?)\]'"]+$/);
    if (trail) { url = url.slice(0, -trail[0].length); suffix = trail[0] + suffix; }
    return `<a href="${url}" target="_blank" rel="noopener" class="ctx-link">${url}</a>${suffix}`;
  });
}

// openAdd can be called bare (defaults from last item) or with a context
// like { project: "mitchs-map", version: "2.5" } to pre-fill the modal.
function openAdd(ctx) {
  const titleEl = document.getElementById("m-title");
  const projEl  = document.getElementById("m-project");
  const verEl   = document.getElementById("m-version");
  if (titleEl) titleEl.value = "";
  if (ctx && typeof ctx === "object") {
    if (ctx.project && projEl) projEl.value = ctx.project;
    if (ctx.version && verEl)  verEl.value  = ctx.version;
  }
  document.getElementById("add-modal").style.display = "flex";
  setTimeout(() => titleEl && titleEl.focus(), 50);
}
function closeAdd() { document.getElementById("add-modal").style.display = "none"; document.getElementById("m-title").value = ""; }
async function createItem() {
  const body = {
    project: (document.getElementById("m-project").value || "mitchs-map").trim().toLowerCase().replace(/\s+/g, '-'),
    title: document.getElementById("m-title").value.trim(),
    version: document.getElementById("m-version").value.trim() || "2.4",
    category: document.getElementById("m-category").value,
    source: document.getElementById("m-source").value,
    source_date: new Date().toISOString().slice(0,10),
  };
  if (!body.title) return;
  const r = await apiFetch("/api/dev-tracker/items", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
  const created = await r.json();
  if (created && created.id) pendingFlash.add(created.id);
  closeAdd();
  load();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeAdd();
  if (e.key === "n" && !e.target.matches("input,textarea,[contenteditable]") && document.getElementById("add-modal").style.display === "none") {
    e.preventDefault(); openAdd();
  }
});

// Smart polling: pause when tab hidden, skip when user is typing in an input/textarea.
let _pollTimer = null;
function startPolling() {
  if (_pollTimer) return;
  _pollTimer = setInterval(() => {
    if (document.hidden) return; // tab not visible — skip
    const ae = document.activeElement;
    if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable)) return; // user is typing — skip
    load();
  }, 30000);
}
function stopPolling() { if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; } }
document.addEventListener("visibilitychange", () => {
  if (document.hidden) { stopPolling(); }
  else { load(); startPolling(); } // refresh + resume immediately when tab returns
});
// Delegated drag-and-drop on the items container — survives every re-render
function bindDragDelegation() {
  const root = document.getElementById("deals");
  if (!root || root.__dragBound) return;
  root.__dragBound = true;
  root.addEventListener("dragstart", onItemDragStart);
  root.addEventListener("dragend", onItemDragEnd);
  root.addEventListener("dragover", onItemDragOver);
  root.addEventListener("drop", onItemDrop);
  // Also bind dragleave to clear stale hint classes
  root.addEventListener("dragleave", (e) => {
    const row = e.target.closest(".item");
    if (row && !row.contains(e.relatedTarget)) {
      row.classList.remove("drag-over-top", "drag-over-bottom");
    }
  });
  bindTouchDrag(root);
}

// === Touch drag — long-press a row to start, drag with finger, release to drop.
// Uses Pointer Events so it works on iOS/Android where HTML5 native drag is broken. ===
function bindTouchDrag(root) {
  if (!matchMedia('(pointer: coarse)').matches) return;
  let srcRow = null;
  let holdTimer = null;
  let dragging = false;
  let startX = 0, startY = 0;
  let lastTargetRow = null;

  function clearHints() {
    document.querySelectorAll(".item.drag-over-top, .item.drag-over-bottom, .item.dragging")
      .forEach(el => el.classList.remove("drag-over-top", "drag-over-bottom", "dragging"));
  }

  root.addEventListener("pointerdown", (e) => {
    if (e.pointerType !== "touch") return;
    if (e.target.closest("input, select, button, textarea, [contenteditable], a, .att-thumb")) return;
    const row = e.target.closest(".item");
    if (!row) return;
    srcRow = row;
    startX = e.clientX; startY = e.clientY;
    holdTimer = setTimeout(() => {
      if (!srcRow) return;
      dragging = true;
      srcRow.classList.add("dragging");
      try { navigator.vibrate?.(15); } catch (_) {}
      // Capture pointer so subsequent moves come to root
      try { root.setPointerCapture(e.pointerId); } catch (_) {}
    }, 380);
  });

  root.addEventListener("pointermove", (e) => {
    if (!srcRow) return;
    if (!dragging) {
      // Cancel long-press if user starts scrolling
      if (Math.abs(e.clientY - startY) > 8 || Math.abs(e.clientX - startX) > 8) {
        clearTimeout(holdTimer); srcRow = null; dragging = false;
      }
      return;
    }
    e.preventDefault(); // suppress page scroll while dragging
    // Find the row under the pointer
    const els = document.elementsFromPoint(e.clientX, e.clientY);
    const overRow = els.find(el => el.classList && el.classList.contains("item") && el !== srcRow);
    if (!overRow) return;
    if (lastTargetRow && lastTargetRow !== overRow) {
      lastTargetRow.classList.remove("drag-over-top", "drag-over-bottom");
    }
    lastTargetRow = overRow;
    const rect = overRow.getBoundingClientRect();
    const isTop = (e.clientY - rect.top) < rect.height / 2;
    overRow.classList.toggle("drag-over-top", isTop);
    overRow.classList.toggle("drag-over-bottom", !isTop);
  }, { passive: false });

  root.addEventListener("pointerup", async (e) => {
    clearTimeout(holdTimer);
    if (!dragging || !srcRow) { srcRow = null; dragging = false; clearHints(); return; }
    const target = lastTargetRow;
    if (target && target !== srcRow) {
      const isTop = target.classList.contains("drag-over-top");
      const targetVersion = target.dataset.version;
      const targetProject = target.dataset.project;
      clearHints();
      try { navigator.vibrate?.(8); } catch (_) {}
      await dropReorder(srcRow.dataset.itemId, target.dataset.itemId, isTop, targetProject, targetVersion);
    } else {
      clearHints();
    }
    srcRow = null; dragging = false; lastTargetRow = null;
  });

  root.addEventListener("pointercancel", () => {
    clearTimeout(holdTimer);
    srcRow = null; dragging = false; lastTargetRow = null;
    clearHints();
  });
}

// === Item detail SIDEBAR — replaces inline row-drawer ===
function openItemSidebar(itemId) {
  document.body.classList.add("has-sidebar");
  // Push URL hash so this record is deep-linkable
  history.replaceState(null, "", "#item-" + itemId);
  setTimeout(() => updateItemSidebar(), 0);
}
function closeItemSidebar() {
  document.body.classList.remove("has-sidebar");
  expandedRows.clear();
  saveExpandedRows();
  // Clear hash from URL
  history.replaceState(null, "", window.location.pathname + window.location.search);
  // render() is needed here: inline drawer is in the DOM (rendered when sidebar was open)
  // and becomes visible as soon as has-sidebar is removed without a re-render.
  render();
}
function updateItemSidebar() {
  if (!document.body.classList.contains("has-sidebar")) return;
  const id = [...expandedRows][0];
  if (!id) { closeItemSidebar(); return; }
  const it = findItem(id);
  if (!it) { closeItemSidebar(); return; }
  const titleEl = document.getElementById("item-sidebar-title");
  const contentEl = document.getElementById("item-sidebar-content");
  if (titleEl) {
    const seq = it.seq_num != null ? `<span class="seq-id">#${it.seq_num}</span>` : "";
    titleEl.innerHTML = `${seq}${escapeHtml(it.title || "Item details")}`;
  }
  if (contentEl) contentEl.innerHTML = renderItemDrawer(it);
  if (typeof wireDragDrop === "function") wireDragDrop();
}
// ESC closes the sidebar
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && document.body.classList.contains("has-sidebar")) {
    if (e.target.matches("input,textarea,[contenteditable=true]")) return;
    closeItemSidebar(); // closeItemSidebar already calls render()
  }
});
// Deep-link: open sidebar for #item-<id> on load (handled after first load() call)
function checkDeepLink() {
  const hash = window.location.hash;
  if (!hash.startsWith("#item-")) return;
  const id = hash.slice(6);
  if (!id) return;
  expandedRows.clear();
  expandedRows.add(id);
  openItemSidebar(id);
  render();
}

// === Right-click context menu (Insert above / below, Duplicate, Delete) ===
function ensureCtxMenu() {
  let m = document.getElementById("row-ctx-menu");
  if (m) return m;
  m = document.createElement("div");
  m.id = "row-ctx-menu";
  m.className = "row-ctx-menu";
  m.innerHTML = `
    <button data-action="insert-above"><span>↑</span> Insert row above</button>
    <button data-action="insert-below"><span>↓</span> Insert row below</button>
    <button data-action="duplicate"><span>⎘</span> Duplicate</button>
    <button data-action="copy-id"><span>#</span> Copy item ID</button>
    <div class="ctx-sep"></div>
    <button data-action="delete" class="danger"><span>×</span> Delete</button>`;
  document.body.appendChild(m);
  m.addEventListener("click", async (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const action = btn.dataset.action;
    const itemId = m.dataset.itemId;
    closeCtxMenu();
    if (!itemId) return;
    if (action === "insert-above") await insertItemAt(itemId, "above");
    else if (action === "insert-below") await insertItemAt(itemId, "below");
    else if (action === "duplicate") await duplicateItem(itemId);
    else if (action === "copy-id") { try { await navigator.clipboard.writeText(itemId); } catch (_) {} }
    else if (action === "delete") await deleteItem(itemId);
  });
  return m;
}
function openCtxMenu(itemId, x, y) {
  const m = ensureCtxMenu();
  m.dataset.itemId = itemId;
  // Clamp to viewport
  const W = 200, H = 220;
  const vx = Math.min(x, window.innerWidth - W - 8);
  const vy = Math.min(y, window.innerHeight - H - 8);
  m.style.left = vx + "px";
  m.style.top = vy + "px";
  m.classList.add("is-open");
}
function closeCtxMenu() {
  const m = document.getElementById("row-ctx-menu");
  if (m) m.classList.remove("is-open");
}
document.addEventListener("contextmenu", (e) => {
  const row = e.target.closest(".item[data-item-id]");
  if (!row) return;
  // Don't intercept right-click on editable fields (let user use system menu)
  if (e.target.closest("[contenteditable=true], input, textarea")) return;
  e.preventDefault();
  openCtxMenu(row.dataset.itemId, e.clientX, e.clientY);
});
document.addEventListener("click", (e) => {
  if (!e.target.closest("#row-ctx-menu")) closeCtxMenu();
});
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeCtxMenu(); });
async function insertItemAt(refId, where) {
  const ref = findItem(refId);
  if (!ref) return;
  // Place new row's sort_order between ref and its neighbor in the same project+version
  let bucket = (projects[ref.project] || [])
    .filter(x => x.version === ref.version)
    .sort((a,b) => (a.sort_order || 0) - (b.sort_order || 0) || new Date(a.created_at) - new Date(b.created_at));

  // If sort_orders are missing or collide, midpoint math collapses to 0 and the new
  // row lands unpredictably. Detect that and renumber the bucket at 100-step intervals
  // first, then compute a clean insert order.
  const seen = new Set();
  let needsRenumber = false;
  for (const it of bucket) {
    const v = it.sort_order;
    if (v == null || seen.has(v)) { needsRenumber = true; break; }
    seen.add(v);
  }
  if (needsRenumber) {
    await Promise.all(bucket.map((it, i) => {
      const newOrder = (i + 1) * 100;
      if (it.sort_order === newOrder) return null;
      it.sort_order = newOrder; // local mirror so subsequent math is correct
      return apiFetch("/api/dev-tracker/items/" + it.id, {
        method: "PATCH", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sort_order: newOrder }),
      });
    }).filter(Boolean));
  }

  const idx = bucket.findIndex(x => x.id === refId);
  let order;
  if (where === "above") {
    const prev = bucket[idx - 1];
    order = prev ? (prev.sort_order + ref.sort_order) / 2 : ref.sort_order - 50;
  } else {
    const next = bucket[idx + 1];
    order = next ? (ref.sort_order + next.sort_order) / 2 : ref.sort_order + 50;
  }
  const body = {
    project: ref.project,
    title: "New item",
    version: ref.version,
    category: ref.category || "feature",
    source: ref.source || "manual",
    source_date: new Date().toISOString().slice(0, 10),
    sort_order: order,
  };
  const r = await apiFetch("/api/dev-tracker/items", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (r.ok) {
    const created = await r.json();
    if (created && created.id) pendingFlash.add(created.id);
    load();
  }
}
async function duplicateItem(refId) {
  const ref = findItem(refId);
  if (!ref) return;
  const body = {
    project: ref.project,
    title: ref.title + " (copy)",
    version: ref.version,
    category: ref.category || "feature",
    source: ref.source || "manual",
    description: ref.description || "",
    source_date: new Date().toISOString().slice(0, 10),
    sort_order: (ref.sort_order || 0) + 5,
  };
  const r = await apiFetch("/api/dev-tracker/items", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (r.ok) {
    const created = await r.json();
    if (created && created.id) pendingFlash.add(created.id);
    load();
  }
}

// === Column resize — drag the right edge of any title to widen/narrow it ===
const COL_LS_KEY = "qa-col-widths-v1";
function applyColWidths() {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(COL_LS_KEY) || "{}"); } catch (_) {}
  if (saved.title) document.documentElement.style.setProperty("--col-title-w", saved.title + "px");
}
function saveColWidth(col, px) {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(COL_LS_KEY) || "{}"); } catch (_) {}
  saved[col] = Math.round(px);
  localStorage.setItem(COL_LS_KEY, JSON.stringify(saved));
}
function bindColResizers() {
  // Event delegation — works regardless of how often render() rewrites the DOM.
  document.addEventListener("mousedown", (e) => {
    const handle = e.target.closest(".col-resizer");
    if (!handle) return;
    e.preventDefault();
    e.stopPropagation();
    const col = handle.dataset.col || "title";
    // Anchor: the title cell to the LEFT of this handle
    const titleEl = handle.previousElementSibling;
    if (!titleEl) return;
    const startX = e.clientX;
    const startW = titleEl.getBoundingClientRect().width;
    handle.classList.add("is-dragging");
    document.body.classList.add("col-dragging");
    const onMove = (ev) => {
      const dx = ev.clientX - startX;
      const next = Math.max(80, Math.min(900, startW + dx));
      document.documentElement.style.setProperty("--col-" + col + "-w", next + "px");
    };
    const onUp = () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      handle.classList.remove("is-dragging");
      document.body.classList.remove("col-dragging");
      const final = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--col-" + col + "-w"));
      if (final) saveColWidth(col, final);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
}
applyColWidths();
bindColResizers();

loadCurrentUser().then(() => { load(true).then(() => checkDeepLink()); startPolling(); bindDragDelegation(); });
</script>
